<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Employee Clock</title>
  <meta name="google-site-verification" content="nyT60jJBASK4X9aWL9A6S_XlXUZSXr9T2JKSoYKULLI" />
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <!-- External Scripts and Styles -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="main.css">
  <script src="main.js" defer></script>
</head>
<body>

  <!-- Main Application Card -->
  <div id="mainCard">
    <div id="clockContainer">
      <div id="date">Loading...</div>
      <div id="clock">--:-- --</div>
    </div>

    <!-- NEW: Status Display -->
    <div id="status-container">
      <div id="status-indicator" class="status-out">Clocked Out</div>
      <div id="last-activity">Enter your ID to see your status</div>
    </div>

    <div class="input-group">
      <label for="empId">Employee ID</label>
      <input id="empId" type="number" placeholder="0000" oninput="if(this.value.length > 4) this.value = this.value.slice(0,4);">
    </div>
    <div class="button-group">
      <button class="clock-in">Clock In</button>
      <button class="clock-out">Clock Out</button>
    </div>
  </div>

  <!-- Modal for Employee Selection -->
  <div id="selectionModal" class="modal">
    <div class="modal-content">
      <h3>Multiple Employees Found</h3>
      <p>Please select your profile to continue.</p>
      <div id="employee-selection-list" class="selection-list"></div>
      <button class="secondary">Cancel</button>
    </div>
  </div>

  <!-- Container for Toast Notifications -->
  <div id="notification-container"></div>

</body>
</html>
