  <script>
    // Script para forzar la actualización del Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister().then(function(unregistered) {
            if (unregistered) {
              console.log('Service Worker unregistered');
              window.location.reload(true);
            }
          });
        }
      });
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    function isOnline() { return navigator.onLine; }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js")
          .then(() => console.log("SW registrado"))
          .catch(err => console.log("Error SW:", err));
      });
    }

    function saveOfflineEntry(entry) {
      let pending = JSON.parse(localStorage.getItem("pendingEntries")) || [];
      pending.push(entry);
      localStorage.setItem("pendingEntries", JSON.stringify(pending));
    }

    async function syncOfflineEntries() {
      // Evita errores si Supabase aún no está inicializado
      if (typeof _supabase === "undefined") {
        console.warn("Supabase not ready yet, will sync later.");
        return;
      }

      let pending = JSON.parse(localStorage.getItem("pendingEntries")) || [];
      if (pending.length === 0) return;
      let remaining = [];
      for (let entry of pending) {
        const { error } = await _supabase.from("time_entries").insert([entry]);
        if (error) remaining.push(entry);
      }
      if (remaining.length > 0) {
        localStorage.setItem("pendingEntries", JSON.stringify(remaining));
      } else {
        localStorage.removeItem("pendingEntries");
      }
    }

    window.addEventListener("online", () => {
      console.log("Internet restaurado. Sincronizando...");
      syncOfflineEntries();
    });
    syncOfflineEntries();
  </script>

function updateClock() {
  const now = new Date();
  const timeOptions = { timeZone: "America/New_York", hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: true };
  const dateOptions = { timeZone: "America/New_York", weekday: "long", year: "numeric", month: "long", day: "numeric" };

function clearInput() { document.getElementById("empId").value = ""; }

async function employeeExists(empId) {
  if (!navigator.onLine) return true;
  const { data, error } = await _supabase.from("employees").select("employee_id").eq("employee_id", empId).single();
  return !error && !!data;
}

function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day;
  const weekStart = new Date(d.setDate(diff));
  weekStart.setHours(0,0,0,0);
  return weekStart;
}

function getWeekEnd(date) {
    const d = new Date(date);
    const day = d.getDay();
    const diff = d.getDate() - day + 6;
    const weekEnd = new Date(d.setDate(diff));
    weekEnd.setHours(23, 59, 59, 999);
    return weekEnd;
}

// Normaliza timestamps que vienen de la base (con o sin zona horaria)
function parseDbTimestamp(value) {
  if (!value) return null;
  if (value instanceof Date) return value;
  let s = String(value).trim();
  if (!s) return null;

  // Reemplaza espacio por 'T' si viene como "2026-03-01 18:08:51.106"
  if (!s.includes("T")) {
    s = s.replace(" ", "T");
  }

  // Si no tiene zona horaria explícita, asumimos UTC
  if (!/[zZ]|[+-]\d\d:?\d\d$/.test(s)) {
    s += "Z";
  }

  const d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}

async function clockIn() {
  const empId = document.getElementById("empId").value.trim();
  if (empId === "9999") { clearInput(); openAdmin(); return; }
  if (!empId) return alert("Enter ID");
  
  const msg = document.getElementById("msg");
  msg.className = ""; 

  const exists = await employeeExists(empId);
  if (!exists) {
    msg.innerText = "Employee not found";
    msg.classList.add("msg-error");
    return;
  }

  const { data: openEntry } = await _supabase.from("time_entries").select("id").eq("employee_id", empId).is("clock_out", null).maybeSingle();
  if (openEntry) {
    msg.innerText = "Already checked in";
    msg.classList.add("msg-error");
    return;
  }

  const now = new Date();
  const entry = {
    employee_id: empId,
    clock_in: now.toISOString(),
    clock_in_local: now.toLocaleString("en-US", { timeZone: "America/New_York" })
  };

  // Guardamos también el clock in local en este dispositivo para calcular horas sin depender de zonas horarias del servidor
  try {
    localStorage.setItem(`clockIn_${empId}`, now.toISOString());
  } catch (e) {
    console.warn("No se pudo guardar clockIn en localStorage", e);
  }

  if (!isOnline()) {
    saveOfflineEntry(entry);
    msg.innerText = "Saved offline";
    clearInput();
    return;
  }

// 🔎 Validar empleado antes de insertar
const { data: employee, error: empError } = await _supabase
  .from("employees")
  .select("*")
  .eq("employee_id", entry.employee_id)
  .eq("active", true)
  .single();

if (empError || !employee) {
  msg.innerText = "Invalid or inactive employee ID";
  msg.classList.add("msg-error");
  return;
}

  const { error } = await _supabase.from("time_entries").insert([entry]);
  if (error) {
    msg.innerText = error.message;
    msg.classList.add("msg-error");
  } else {
    msg.innerText = "Checked In Successfully";
    msg.classList.add("msg-success");
    clearInput();
  }
}

async function clockOut() {
  const empId = document.getElementById("empId").value.trim();
  if (!empId) return alert("Enter ID");
  const msg = document.getElementById("msg");
  msg.className = "";

  const exists = await employeeExists(empId);
  if (!exists) {
    msg.innerText = "Employee not found";
    msg.classList.add("msg-error");
    return;
  }

  const { data: openEntry } = await _supabase.from("time_entries").select("id, clock_in").eq("employee_id", empId).is("clock_out", null).maybeSingle();

  if (!openEntry) {
    msg.innerText = "No active check-in";
    msg.classList.add("msg-error");
    return;
  }

  const now = new Date();
  const clockOutISO = now.toISOString();
  const clockOutLocalStr = now.toLocaleString("en-US", { timeZone: "America/New_York" });
  
  // Hora de entrada: 1) localStorage (mismo dispositivo), 2) clock_in de la base como UTC
  let clockInTime = null;
  try {
    const stored = localStorage.getItem(`clockIn_${empId}`);
    if (stored) {
      clockInTime = new Date(stored);
    }
  } catch (e) {
    console.warn("No se pudo leer clockIn de localStorage", e);
  }
  if (!clockInTime && openEntry.clock_in) {
    clockInTime = parseDbTimestamp(openEntry.clock_in);
  }
  if (!clockInTime) {
    msg.innerText = "No se puede calcular el turno. Pida al administrador que ajuste la entrada.";
    msg.classList.add("msg-error");
    return;
  }

  let shiftHours = (now - clockInTime) / 3600000;

  // NUNCA guardar ni mostrar horas negativas (protección contra zona horaria/caché)
  if (shiftHours < 0) {
    shiftHours = 0;
  }
  if (shiftHours > 24) {
    msg.innerText = "Turno mayor a 24 horas. Cierre desde el panel de administración.";
    msg.classList.add("msg-error");
    return;
  }

  const weekStart = getWeekStart(now).toISOString();
  const { data: weekEntries } = await _supabase.from("time_entries").select("regular_hours, overtime_hours, clock_out").eq("employee_id", empId).gte("clock_in", weekStart);

  let weekTotal = 0;
  if (weekEntries) {
    weekEntries.forEach(e => {
      if (e.clock_out) {
        weekTotal += Number(e.regular_hours || 0);
        weekTotal += Number(e.overtime_hours || 0);
      }
    });
  }

  let regularHours = 0;
  let overtimeHours = 0;
  const safeWeekTotal = Math.max(0, weekTotal);
  if (safeWeekTotal >= 40) {
    overtimeHours = shiftHours;
  } else if (safeWeekTotal + shiftHours <= 40) {
    regularHours = shiftHours;
  } else {
    regularHours = 40 - safeWeekTotal;
    overtimeHours = shiftHours - regularHours;
  }
  regularHours = Math.max(0, regularHours);
  overtimeHours = Math.max(0, overtimeHours);

  const { data: employee } = await _supabase.from("employees").select("hourly_rate, overtime_multiplier, tax_percent").eq("employee_id", empId).single();

  const round = (num) => Math.round(num * 100) / 100;
  const regularPay = round(regularHours * employee.hourly_rate);
  const overtimePay = round(overtimeHours * employee.hourly_rate * employee.overtime_multiplier);
  const grossPay = round(regularPay + overtimePay);
  const taxes = round(grossPay * (employee.tax_percent / 100));
  const netPay = round(grossPay - taxes);

  const { error } = await _supabase.from("time_entries").update({
    clock_out: clockOutISO,
    clock_out_local: clockOutLocalStr,
    total_hours: Number(shiftHours.toFixed(4)),
    regular_hours: Number(regularHours.toFixed(4)),
    overtime_hours: Number(overtimeHours.toFixed(4)),
    regular_pay: regularPay,
    overtime_pay: overtimePay,
    gross_pay: grossPay,
    taxes: taxes,
    net_pay: netPay
  }).eq("id", openEntry.id);

  if (error) {
    msg.innerText = error.message;
    msg.classList.add("msg-error");
  } else {
    try { localStorage.removeItem(`clockIn_${empId}`); } catch (e) {}
    msg.innerText = `Out: ${regularHours.toFixed(2)} reg / ${overtimeHours.toFixed(2)} OT`;
    msg.classList.add("msg-success");
    clearInput();
  }
}

async function updateDashboardMetrics() {
  document.getElementById("metricHoursToday").innerText = "...";
  document.getElementById("metricClockedIn").innerText = "...";
  document.getElementById("metricWeeklyPayroll").innerText = "...";

  // 1. Total employees currently clocked in
  const { count: clockedInCount, error: clockedInError } = await _supabase
    .from("time_entries")
    .select('*', { count: 'exact', head: true })
    .is("clock_out", null);
  if(clockedInError) console.error("Dashboard metric error (clockedIn):", clockedInError);
  document.getElementById("metricClockedIn").innerText = clockedInError ? 'Error' : clockedInCount;

  // 2. Total hours today
  const now = new Date();
  const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
  const endOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);

  const { data: todayEntries, error: todayError } = await _supabase
    .from("time_entries")
    .select("total_hours")
    .gte("clock_in", startOfDay.toISOString())
    .lte("clock_in", endOfDay.toISOString());
  
  if(todayError) console.error("Dashboard metric error (hoursToday):", todayError);
  let totalHoursToday = 0;
  if (todayEntries) {
    totalHoursToday = todayEntries.reduce((sum, entry) => sum + (entry.total_hours || 0), 0);
  }
  document.getElementById("metricHoursToday").innerText = todayError ? 'Error' : totalHoursToday.toFixed(2);

  // 3. Weekly payroll total
  const weekStart = getWeekStart(new Date()).toISOString();
  const { data: weekEntries, error: weekError } = await _supabase
    .from("time_entries")
    .select("gross_pay")
    .gte("clock_in", weekStart);

  if(weekError) console.error("Dashboard metric error (weeklyPayroll):", weekError);
  let weeklyPayroll = 0;
  if (weekEntries) {
    weeklyPayroll = weekEntries.reduce((sum, entry) => sum + (entry.gross_pay || 0), 0);
  }
  document.getElementById("metricWeeklyPayroll").innerText = weekError ? 'Error' : `$${(weeklyPayroll || 0).toFixed(2)}`;
}

async function adminCloseEntry(entryId) {

  if (!confirm("Close this entry now?")) return;

  const { data: entry, error: loadError } = await _supabase
    .from("time_entries")
    .select("id, employee_id, clock_in")
    .eq("id", entryId)
    .single();

  if (loadError || !entry) {
    alert("Error loading entry");
    return;
  }

  const now = new Date();
  const clockOutISO = now.toISOString();
  const clockOutLocalStr = now.toLocaleString("en-US", { timeZone: "America/New_York" });

  const clockInTime = parseDbTimestamp(entry.clock_in);
  if (!clockInTime || now <= clockInTime) {
    alert("Clock in time is invalid");
    return;
  }
  const shiftHours = (now - clockInTime) / 3600000;
  console.log("DEBUG adminCloseEntry", {
    dbClockIn: entry.clock_in,
    parsedClockIn: clockInTime.toISOString(),
    nowIso: now.toISOString(),
    shiftHours
  });

  const weekStart = getWeekStart(now).toISOString();
  const { data: weekEntries } = await _supabase
    .from("time_entries")
    .select("regular_hours, overtime_hours, clock_out")
    .eq("employee_id", entry.employee_id)
    .gte("clock_in", weekStart);

  let weekTotal = 0;
  if (weekEntries) {
    weekEntries.forEach(e => {
      if (e.clock_out) {
        weekTotal += Number(e.regular_hours || 0);
        weekTotal += Number(e.overtime_hours || 0);
      }
    });
  }

  let regularHours = 0;
  let overtimeHours = 0;
  if (weekTotal >= 40) {
    overtimeHours = shiftHours;
  } else if (weekTotal + shiftHours <= 40) {
    regularHours = shiftHours;
  } else {
    regularHours = 40 - weekTotal;
    overtimeHours = shiftHours - regularHours;
  }

  const { data: employee, error: empError } = await _supabase
    .from("employees")
    .select("hourly_rate, overtime_multiplier, tax_percent")
    .eq("employee_id", entry.employee_id)
    .single();

  if (empError || !employee) {
    alert("Error loading employee");
    return;
  }

  const round = (num) => Math.round(num * 100) / 100;
  const regularPay = round(regularHours * employee.hourly_rate);
  const overtimePay = round(overtimeHours * employee.hourly_rate * employee.overtime_multiplier);
  const grossPay = round(regularPay + overtimePay);
  const taxes = round(grossPay * (employee.tax_percent / 100));
  const netPay = round(grossPay - taxes);

  const { error: updateError } = await _supabase
    .from("time_entries")
    .update({
      clock_out: clockOutISO,
      clock_out_local: clockOutLocalStr,
      total_hours: Number(shiftHours.toFixed(4)),
      regular_hours: Number(regularHours.toFixed(4)),
      overtime_hours: Number(overtimeHours.toFixed(4)),
      regular_pay: regularPay,
      overtime_pay: overtimePay,
      gross_pay: grossPay,
      taxes: taxes,
      net_pay: netPay
    })
    .eq("id", entry.id);

  if (updateError) {
    alert("Error closing entry");
    return;
  }

  alert("Entry closed successfully");
  viewTimeEntries();
}

async function openEditEntry(id) {
  editingEntryId = id;

  const { data, error } = await _supabase
    .from("time_entries")
    .select("*")
    .eq("id", id)
    .single();

  if (error) {
    alert("Error loading entry");
    return;
  }

  const ci = parseDbTimestamp(data.clock_in);
  const co = parseDbTimestamp(data.clock_out);

  document.getElementById("editClockIn").value =
    ci ? ci.toISOString().slice(0,16) : "";

  document.getElementById("editClockOut").value =
    co ? co.toISOString().slice(0,16) : "";

  document.getElementById("editEntryModal").classList.remove("hidden");
}

function closeEditModal() {
  editingEntryId = null;
  document.getElementById("editEntryModal").classList.add("hidden");
}

async function saveEditedEntry() {
  if (!editingEntryId) return;

  const newClockIn = document.getElementById("editClockIn").value;
  const newClockOut = document.getElementById("editClockOut").value;

  if (!newClockIn || !newClockOut) {
    alert("Both times are required.");
    return;
  }

  const clockInDate = new Date(newClockIn);
  const clockOutDate = new Date(newClockOut);

  if (clockOutDate <= clockInDate) {
    alert("Clock out must be after clock in.");
    return;
  }

  const shiftHours = (clockOutDate - clockInDate) / 3600000;
  if (shiftHours <= 0 || shiftHours > 24) {
      alert("Shift duration must be between 0 and 24 hours.");
      return;
  }

  // 1. Obtener la entrada y el empleado
  const { data: entryData, error: entryError } = await _supabase
    .from("time_entries")
    .select("employee_id, clock_in")
    .eq("id", editingEntryId)
    .single();

  if (entryError) {
    console.error("Save Error (loading entry):", entryError);
    alert("Failed to load entry data: " + entryError.message);
    return;
  }

  const { data: employee, error: empError } = await _supabase
    .from("employees")
    .select("hourly_rate, overtime_multiplier, tax_percent")
    .eq("employee_id", entryData.employee_id)
    .single();

  if (empError) {
    console.error("Save Error (loading employee):", empError);
    alert("Failed to load employee data: " + empError.message);
    return;
  }
    
  // 2. Calcular el total de horas de la semana EXCLUYENDO la entrada actual
  const weekStart = getWeekStart(clockInDate);
  const weekEnd = getWeekEnd(clockInDate);

  const { data: weekEntries, error: weekEntriesError } = await _supabase
    .from("time_entries")
    .select("regular_hours, overtime_hours, id")
    .eq("employee_id", entryData.employee_id)
    .gte("clock_in", weekStart.toISOString())
    .lte("clock_in", weekEnd.toISOString());

  if (weekEntriesError) {
      console.error("Save Error (calculating weekly hours):", weekEntriesError);
      alert("Could not calculate weekly hours: " + weekEntriesError.message);
      return;
  }

  let weekTotalHoursBeforeThisEntry = 0;
  if (weekEntries) {
    weekEntries.forEach(e => {
      if (e.id !== editingEntryId) {
          weekTotalHoursBeforeThisEntry += (Number(e.regular_hours) || 0) + (Number(e.overtime_hours) || 0);
      }
    });
  }

  // 3. Calcular horas regulares y OT para ESTA entrada
  let regularHours = 0;
  let overtimeHours = 0;
  const safeWeekTotal = Math.max(0, weekTotalHoursBeforeThisEntry);

  if (safeWeekTotal >= 40) {
    overtimeHours = shiftHours;
  } else if (safeWeekTotal + shiftHours <= 40) {
    regularHours = shiftHours;
  } else {
    regularHours = 40 - safeWeekTotal;
    overtimeHours = shiftHours - regularHours;
  }
  regularHours = Math.max(0, regularHours);
  overtimeHours = Math.max(0, overtimeHours);

  // 4. Recalcular el pago
  const round = (num) => Math.round(num * 100) / 100;
  const totalHours = Number(shiftHours.toFixed(4));
  const regularPay = round(regularHours * employee.hourly_rate);
  const overtimePay = round(overtimeHours * employee.hourly_rate * employee.overtime_multiplier);
  const grossPay = round(regularPay + overtimePay);
  const taxes = round(grossPay * (employee.tax_percent / 100));
  const netPay = round(grossPay - taxes);

  // 5. Actualizar la entrada
  const { error: updateError } = await _supabase
    .from("time_entries")
    .update({
      clock_in: clockInDate.toISOString(),
      clock_out: clockOutDate.toISOString(),
      total_hours: totalHours,
      regular_hours: Number(regularHours.toFixed(4)),
      overtime_hours: Number(overtimeHours.toFixed(4)),
      regular_pay: regularPay,
      overtime_pay: overtimePay,
      gross_pay: grossPay,
      taxes: taxes,
      net_pay: netPay
    })
    .eq("id", editingEntryId);

  if (updateError) {
    console.error("Supabase update error:", updateError);
    alert("Error saving changes: " + updateError.message);
    return;
  }

  alert("Entry updated successfully!");
  closeEditModal();
  viewTimeEntries(); // Refrescar la tabla
}
</script>
