<script>
const _supabase = supabase.createClient("https://jqppakaodpgbtxzpvsti.supabase.co", "sb_publishable_ZwLCHMtM9uCfBFkwBcSSEQ_zQVq1RwI");

function updateClock() { /* Unchanged */ }

async function clockOut() { /* Unchanged */ }

// --- ADMIN LOGIC --- 

function openAdmin() {
  document.getElementById("adminModal").classList.remove("hidden");
  document.getElementById("adminPinInput").focus();
}

function closeAdminModal() {
  document.getElementById("adminModal").classList.add("hidden");
  document.getElementById("adminPinInput").value = "";
}

async function validateAdmin() {
  const pinInput = document.getElementById("adminPinInput");
  const pin = pinInput.value.trim();
  if (!pin) return;
  
  // CORRECTED LINE: Changed .eq("password", pin) back to .eq("pin", pin)
  const { data, error } = await _supabase.from("admins").select("*").eq("pin", pin).single();
  
  if (error || !data) {
    alert("Incorrect PIN or admin not found.");
    pinInput.value = "";
    return;
  }
  
  if (!data.active) {
    alert("This admin account is inactive.");
    pinInput.value = "";
    return;
  }

  sessionStorage.setItem('adminAuthenticated', 'true');
  sessionStorage.setItem('adminData', JSON.stringify(data));
  window.location.href = 'admin.html';
}

// ... other functions (keepScreenOn, getWeekStart, etc.) are unchanged ...

</script>
