  <script>
    function isOnline() { return navigator.onLine; }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js")
          .then(() => console.log("SW registrado"))
          .catch(err => console.log("Error SW:", err));
      });
    }

    function saveOfflineEntry(entry) {
      let pending = JSON.parse(localStorage.getItem("pendingEntries")) || [];
      pending.push(entry);
      localStorage.setItem("pendingEntries", JSON.stringify(pending));
    }

    async function syncOfflineEntries() {
      if (typeof _supabase === "undefined") { return; }
      let pending = JSON.parse(localStorage.getItem("pendingEntries")) || [];
      if (pending.length === 0) return;
      let remaining = [];
      for (let entry of pending) {
        const { error } = await _supabase.from("time_entries").insert([entry]);
        if (error) remaining.push(entry);
      }
      if (remaining.length > 0) {
        localStorage.setItem("pendingEntries", JSON.stringify(remaining));
      } else {
        localStorage.removeItem("pendingEntries");
      }
    }
    
    async function syncProjects() {
        if (!isOnline()) return;
        console.log("Sincronizando clientes y proyectos...");
        const { data: clients, error: clientError } = await _supabase.from('clients').select('id, name').eq('active', true);
        const { data: projects, error: projectError } = await _supabase.from('projects').select('id, name, client_id').eq('active', true);
        if (clientError || projectError) {
            console.error("Error sincronizando datos.");
            return;
        }
        const projectData = {
            clients: clients,
            projects: projects,
            timestamp: new Date().getTime()
        };
        localStorage.setItem('projectData', JSON.stringify(projectData));
        console.log("Clientes y proyectos sincronizados.");
    }

    window.addEventListener("online", () => {
      console.log("Internet restaurado. Sincronizando...");
      syncOfflineEntries();
      syncProjects();
    });
    
    syncOfflineEntries();
    syncProjects();

  </script>

function populateProjectSelector() {
    const projectData = JSON.parse(localStorage.getItem('projectData'));
    if (!projectData) {
        alert('Project data not synced. Please check internet connection.');
        return;
    }
    const selector = document.getElementById('projectSelector');
    selector.innerHTML = '<option value="">-- Select a Project --</option>';

    projectData.clients.forEach(client => {
        const optgroup = document.createElement('optgroup');
        optgroup.label = client.name;
        const clientProjects = projectData.projects.filter(p => p.client_id === client.id);
        if(clientProjects.length > 0){
            clientProjects.forEach(project => {

                option.value = project.id;
                option.textContent = project.name;

            });

async function clockIn() {
  const empId = document.getElementById("empId").value.trim();
  if (empId === "9999") { clearInput(); openAdmin(); return; }
  if (!empId) return alert("Enter ID");

  const projectGroup = document.querySelector('.project-group');
  const projectSelector = document.getElementById('projectSelector');

  // If project selector is visible, it means we are in the second step of clocking in.
  if (!projectGroup.classList.contains('hidden')) {
    const projectId = projectSelector.value;
    if (!projectId) {
        alert("Please select a project before clocking in.");
        return;
    }

    const msg = document.getElementById("msg");
    msg.className = "";
    
    const now = new Date();
    const entry = { 
        employee_id: empId, 
        clock_in: now.toISOString(), 
        project_id: projectId
    };

    try { localStorage.setItem(`clockIn_${empId}`, now.toISOString()); } catch (e) { console.warn("Could not save clockIn to localStorage", e); }
    
    if (!isOnline()) {
        saveOfflineEntry(entry);
        msg.innerText = "Saved offline";
        msg.classList.add("msg-success");
        clearInput();
        projectGroup.classList.add('hidden');
        return;
    }

    const { error } = await _supabase.from("time_entries").insert([entry]);
    if (error) {
        msg.innerText = error.message;
        msg.classList.add("msg-error");
    } else {
        msg.innerText = "Checked In Successfully";
        msg.classList.add("msg-success");
        clearInput();
        projectGroup.classList.add('hidden');
    }

  } else {
    // First step: validate employee and show project selector
    const msg = document.getElementById("msg");
    msg.className = "";
    const exists = await employeeExists(empId);
    if (!exists) { msg.innerText = "Employee not found"; msg.classList.add("msg-error"); return; }
    
    const { data: openEntry } = await _supabase.from("time_entries").select("id").eq("employee_id", empId).is("clock_out", null).maybeSingle();
    if (openEntry) { msg.innerText = "Already checked in"; msg.classList.add("msg-error"); return; }

    populateProjectSelector();
    projectGroup.classList.remove('hidden');
    document.getElementById('empId').disabled = true; // Disable ID input
    msg.innerText = "Please select a project.";
    msg.classList.add("msg-success");
  }
}
