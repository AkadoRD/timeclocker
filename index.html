
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Employee Clock</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    function isOnline() { return navigator.onLine; }
    if ("serviceWorker" in navigator) { window.addEventListener("load", () => { navigator.serviceWorker.register("./sw.js"); }); }
    
    function saveOfflineAction(action) { 
      let p = JSON.parse(localStorage.getItem("pendingActions")) || [];
      p.push(action);
      localStorage.setItem("pendingActions", JSON.stringify(p));
    }

    async function syncOfflineActions() {
      if(typeof _supabase === "undefined" || !isOnline()) return;
      let pendingActions = JSON.parse(localStorage.getItem("pendingActions")) || [];
      if (pendingActions.length === 0) return;

      console.log(`Syncing ${pendingActions.length} pending actions...`);
      const remainingActions = [];
      
      for (const action of pendingActions) {
        let success = false;
        try {
          if (action.type === 'clock_in') {
            const { data: employee } = await _supabase.from("employees").select("current_project_id, client_id").eq("employee_id", action.employee_id).eq("active", true).single();
            if (employee) {
              const { error } = await _supabase.from("time_entries").insert([{ 
                employee_id: action.employee_id, 
                clock_in: action.timestamp, 
                project_id: employee.current_project_id, 
                client_id: employee.client_id,
                clock_in_lat: action.lat,
                clock_in_lon: action.lon
              }]);
              if (!error) success = true;
              else console.error('Sync clock-in error:', error.message);
            }
          } else if (action.type === 'clock_out') {
            const { data: openEntry } = await _supabase.from("time_entries").select("id").eq("employee_id", action.employee_id).is("clock_out", null).maybeSingle();
            if (openEntry) {
              const { error } = await _supabase.from("time_entries").update({ 
                clock_out: action.timestamp,
                clock_out_lat: action.lat,
                clock_out_lon: action.lon
              }).eq("id", openEntry.id);
              if (!error) success = true;
              else console.error('Sync clock-out error:', error.message);
            } else {
              success = true; 
            }
          }
        } catch (e) {
          console.error('Exception during sync:', e.message);
        }

        if (!success) {
          remainingActions.push(action);
        }
      }
      localStorage.setItem("pendingActions", JSON.stringify(remainingActions));
      if(remainingActions.length === 0) console.log('All pending actions synced successfully!');
      else console.log(`${remainingActions.length} actions failed to sync, will retry later.`);
    }

    window.addEventListener("online", syncOfflineActions);

    function getGeolocation() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) {
          console.log("Geolocation is not supported by this browser.");
          resolve({ lat: null, lon: null });
        } else {
          navigator.geolocation.getCurrentPosition(
            (position) => {
              resolve({
                lat: position.coords.latitude,
                lon: position.coords.longitude,
              });
            },
            () => {
              console.log("Unable to retrieve your location.");
              alert("Unable to get location. Please enable location services and grant permission.");
              resolve({ lat: null, lon: null });
            }
          );
        }
      });
    }
  </script>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; user-select: none; touch-action: manipulation; }
    #mainCard { background: white; width: 90%; max-width: 450px; padding: 3rem 2rem; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); text-align: center; }
    #clockContainer { margin-bottom: 2.5rem; }
    #date { font-size: 1.1rem; color: #7f8c8d; margin-bottom: 0.5rem; font-weight: 500; }
    #clock { font-size: 3.5rem; font-weight: 700; color: #2cb3ba; font-variant-numeric: tabular-nums; }
    .input-group { margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.9rem; font-weight: 600; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.8rem; }
    input#empId, input#empPin { width: 100%; padding: 1rem; font-size: 1.5rem; border: 2px solid #dcdde1; border-radius: 16px; text-align: center; box-sizing: border-box; }
    .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    button { padding: 1.2rem; font-size: 1.1rem; font-weight: 600; border: none; border-radius: 14px; cursor: pointer; }
    button[onclick="clockIn()"] { background-color: #eb8e55; color: white; }
    button[onclick="clockOut()"] { background-color: #2cb3ba; color: white; }
    #msg { margin-top: 2rem; padding: 1rem; font-size: 1rem; min-height: 20px; border-radius: 12px; font-weight: 500; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 10000; }
    .modal-content { background: white; padding: 20px; border-radius: 8px; text-align: center; }
    .hidden { display: none !important; }
    input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number], input[type=password] { -moz-appearance: textfield; }
  </style>
</head>
<body>

<div id="mainCard">
  <div id="clockContainer">
    <div id="date"></div>
    <div id="clock"></div>
  </div>
  <div class="input-group">
    <label>Employee ID</label>
    <input id="empId" type="number" placeholder="0000" oninput="if(this.value.length > 4) this.value = this.value.slice(0,4);">
  </div>
  <div class="input-group">
    <label>PIN</label>
    <input id="empPin" type="password" placeholder="••••" maxlength="4" inputmode="numeric" pattern="[0-9]*">
  </div>
  <div class="button-group">
    <button onclick="clockIn()">Clock In</button>
    <button onclick="clockOut()">Clock Out</button>
  </div>
  <p id="msg"></p>
</div>

<div id="adminModal" class="modal hidden">
  <div class="modal-content">
    <h3>Enter Admin PIN</h3>
    <input type="password" id="adminPinInput" placeholder="PIN" maxlength="4" inputmode="numeric" pattern="[0-9]*" />
    <button onclick="validateAdmin()">Enter</button>
    <button onclick="closeAdminModal()">Cancel</button>
  </div>
</div>

<script>
const _supabase = supabase.createClient("https://jqppakaodpgbtxzpvsti.supabase.co", "sb_publishable_ZwLCHMtM9uCfBFkwBcSSEQ_zQVq1RwI");

document.addEventListener('DOMContentLoaded', () => {
    updateClock();
    setInterval(updateClock, 1000);
    syncOfflineActions(); // Attempt to sync on page load
    const clockElement = document.getElementById("clock");
    let pressTimer = null;
    const startPress = () => { pressTimer = setTimeout(openAdmin, 3000); };
    const cancelPress = () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } };
    clockElement.addEventListener("mousedown", startPress);
    clockElement.addEventListener("mouseup", cancelPress);
    clockElement.addEventListener("touchstart", startPress);
    clockElement.addEventListener("touchend", cancelPress);
});

function updateClock() {
  const now = new Date();
  document.getElementById("clock").innerText = now.toLocaleTimeString("en-US", { timeZone: "America/New_York", hour: "2-digit", minute: "2-digit", hour12: true });
  document.getElementById("date").innerText = now.toLocaleDateString("en-US", { timeZone: "America/New_York", weekday: "long", month: "long", day: "numeric" });
}

function resetUI() {
    document.getElementById("empId").value = "";
    document.getElementById("empPin").value = "";
    document.getElementById("msg").innerText = "";
}

async function clockIn() {
    const empId = document.getElementById("empId").value.trim();
    if (empId === "9999") { openAdmin(); return; }
    if (!empId) { alert("Please enter an Employee ID."); return; }
    const msg = document.getElementById("msg");
    msg.innerText = "Getting location...";
    const now = new Date().toISOString();
    
    const location = await getGeolocation();
    msg.innerText = "Processing...";

    if (isOnline()) {
        const { data: openEntry } = await _supabase.from("time_entries").select("id").eq("employee_id", empId).is("clock_out", null).maybeSingle();
        if (openEntry) { msg.innerText = "You are already clocked in."; return; }
        const { data: employee } = await _supabase.from("employees").select("current_project_id, client_id").eq("employee_id", empId).eq("active", true).single();
        if (!employee) { msg.innerText = "Employee not found or inactive."; return; }
        const { error } = await _supabase.from("time_entries").insert([{ 
            employee_id: empId, 
            clock_in: now, 
            project_id: employee.current_project_id, 
            client_id: employee.client_id,
            clock_in_lat: location.lat,
            clock_in_lon: location.lon
        }]);
        if (error) { msg.innerText = `Error: ${error.message}`; } 
        else { msg.innerText = "Checked In!"; setTimeout(resetUI, 2000); }
    } else {
        saveOfflineAction({ 
            type: 'clock_in', 
            employee_id: empId, 
            timestamp: now,
            lat: location.lat,
            lon: location.lon
        });
        msg.innerText = "Saved offline. Will sync when online.";
        setTimeout(resetUI, 2000);
    }
}

async function clockOut() {
    const empId = document.getElementById("empId").value.trim();
    if (!empId) { alert("Please enter an Employee ID."); return; }
    const msg = document.getElementById("msg");
    msg.innerText = "Getting location...";
    const now = new Date().toISOString();

    const location = await getGeolocation();
    msg.innerText = "Processing...";

    if (isOnline()) {
      const { data: openEntry } = await _supabase.from("time_entries").select("id").eq("employee_id", empId).is("clock_out", null).maybeSingle();
      if (!openEntry) { msg.innerText = "No active clock-in found."; return; }
      const { error } = await _supabase.from("time_entries").update({ 
          clock_out: now,
          clock_out_lat: location.lat,
          clock_out_lon: location.lon
      }).eq("id", openEntry.id);
      if (error) { msg.innerText = `Error: ${error.message}`; } 
      else { msg.innerText = "Clocked Out!"; setTimeout(resetUI, 2000); }
    } else {
        saveOfflineAction({ 
            type: 'clock_out', 
            employee_id: empId, 
            timestamp: now,
            lat: location.lat,
            lon: location.lon
        });
        msg.innerText = "Clock-out saved offline. Will sync when online.";
        setTimeout(resetUI, 2000);
    }
}

function openAdmin() {
  document.getElementById("adminModal").classList.remove("hidden");
  document.getElementById("adminPinInput").focus();
}

function closeAdminModal() {
  document.getElementById("adminModal").classList.add("hidden");
  document.getElementById("adminPinInput").value = "";
}

async function validateAdmin() {
    const pin = document.getElementById("adminPinInput").value.trim();
    if (!pin) return;

    const { data: adminUser, error: adminError } = await _supabase
        .from("admins")
        .select("id, name, role")
        .eq("pin", pin)
        .single();

    if (adminError || !adminUser) {
        alert("Incorrect PIN or admin account issue.");
        return;
    }

    let { data: client, error: clientError } = await _supabase
        .from("clients")
        .select("id")
        .eq("admin_id", adminUser.id)
        .maybeSingle();

    if (clientError) {
        alert(`Database error: Could not check for client. Have you added the 'admin_id' column to the 'clients' table? Error: ${clientError.message}`);
        return;
    }

    let finalClientId = client ? client.id : null;

    if (adminUser.role === 'owner' && !finalClientId) {
        const { data: newClient, error: newClientError } = await _supabase
            .from('clients')
            .insert({ 
                name: `${adminUser.name}\'s Company`, 
                admin_id: adminUser.id
            })
            .select('id')
            .single();
        
        if (newClientError) {
            alert(`Failed to create and link new client company. Error: ${newClientError.message}`);
            return;
        }
        finalClientId = newClient.id;
    }

    if (!finalClientId) {
        alert("This admin account is not linked to a client company.");
        return;
    }

    const adminData = {
        name: adminUser.name,
        client_id: finalClientId
    };
    
    sessionStorage.setItem('adminData', JSON.stringify(adminData));
    window.location.href = 'admin.html';
}

</script>
</body>
</html>
