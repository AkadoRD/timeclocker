<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .container { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #2f3640; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #2cb3ba; color: white; border: none; padding: 12px 18px; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: 500; width: 100%; transition: background-color 0.2s; }
        button:hover { background-color: #259399; }
        .message { margin-top: 15px; }
        .error { color: red; }
        .success { color: green; }
        a { color: #2cb3ba; text-decoration: none; margin-top: 15px; display: inline-block; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div id="login-container" class="container">
        <h2>Admin Login</h2>
        <form id="login-form">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p id="login-message" class="message error" style="display: none;"></p>
        <a href="#" id="forgot-password-link">Forgot Password?</a>
    </div>

    <div id="reset-password-container" class="container" style="display: none;">
        <h2>Reset Password</h2>
        <form id="reset-password-form">
            <input type="email" id="reset-email" placeholder="Enter your email" required>
            <button type="submit">Send Reset Link</button>
        </form>
        <p id="reset-message" class="message" style="display: none;"></p>
        <a href="#" id="back-to-login-link">Back to Login</a>
    </div>

    <script>
        const SUPABASE_URL = 'https://jqppakaodpgbtxzpvsti.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcHBha2FvZHBnYnR4enB2c3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDIxOTEsImV4cCI6MjA4NjY3ODE5MX0.ksc0lzbjlMxC942dkSBSwJHpnwTjcyFV4ZX91LFtijk';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const loginContainer = document.getElementById('login-container');
        const resetContainer = document.getElementById('reset-password-container');
        const forgotLink = document.getElementById('forgot-password-link');
        const backToLoginLink = document.getElementById('back-to-login-link');

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                window.location.href = 'admin.html';
            }
        });
        
        forgotLink.addEventListener('click', (e) => {
            e.preventDefault();
            loginContainer.style.display = 'none';
            resetContainer.style.display = 'block';
        });

        backToLoginLink.addEventListener('click', (e) => {
            e.preventDefault();
            resetContainer.style.display = 'none';
            loginContainer.style.display = 'block';
        });

        document.getElementById('login-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginMessage = document.getElementById('login-message');

            try {
                const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                if (data.user) {
                    window.location.href = 'admin.html';
                }
            } catch (error) {
                loginMessage.textContent = 'Error: ' + error.message;
                loginMessage.style.display = 'block';
            }
        });

        document.getElementById('reset-password-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const email = document.getElementById('reset-email').value;
            const resetMessage = document.getElementById('reset-message');

            try {
                const { error } = await _supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/update-password.html'
                });
                
                if (error) throw error;

                resetMessage.textContent = 'Success! If an account exists for this email, a password reset link has been sent.';
                resetMessage.className = 'message success';
                resetMessage.style.display = 'block';
            } catch (error) {
                resetMessage.textContent = 'Error: ' + error.message;
                resetMessage.className = 'message error';
                resetMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
