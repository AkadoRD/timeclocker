let editingEntryId = null;
let editingEmployeeId = null;

function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day;
  const weekStart = new Date(d.setDate(diff));
  weekStart.setHours(0,0,0,0);
  return weekStart;
}

function parseDbTimestamp(value) {
  if (!value) return null;
  if (value instanceof Date) return value;
  let s = String(value).trim();
  if (!s) return null;
  if (!s.includes("T")) { s = s.replace(" ", "T"); }
  if (!/[zZ]|[+-]\d\d:?\d\d$/.test(s)) { s += "Z"; }
  const d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}

async function updateDashboardMetrics() {
  document.getElementById("metricHoursToday").innerText = "...";
  document.getElementById("metricClockedIn").innerText = "...";
  document.getElementById("metricWeeklyPayroll").innerText = "...";
  const { count: clockedInCount } = await _supabase.from("time_entries").select('*', { count: 'exact', head: true }).is("clock_out", null);
  document.getElementById("metricClockedIn").innerText = clockedInCount ?? 'Error';
  const now = new Date();
  const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
  const endOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
  const { data: todayEntries } = await _supabase.from("time_entries").select("total_hours").gte("clock_in", startOfDay.toISOString()).lte("clock_in", endOfDay.toISOString());
  let totalHoursToday = 0;
  if (todayEntries) { totalHoursToday = todayEntries.reduce((sum, entry) => sum + (entry.total_hours || 0), 0); }
  document.getElementById("metricHoursToday").innerText = totalHoursToday.toFixed(2);
  const weekStart = getWeekStart(new Date()).toISOString();
  const { data: weekEntries } = await _supabase.from("time_entries").select("gross_pay").gte("clock_in", weekStart);
  let weeklyPayroll = 0;
  if (weekEntries) { weeklyPayroll = weekEntries.reduce((sum, entry) => sum + (entry.gross_pay || 0), 0); }
  document.getElementById("metricWeeklyPayroll").innerText = `$${(weeklyPayroll || 0).toFixed(2)}`;
}

    const { data, error } = await _supabase.from("employees").select("*").order("employee_id", { ascending: true });

    let html = "<h3>Current Employees</h3><table><tr><th>ID</th><th>Name</th><th>Rate</th><th>Status</th><th>Action</th></tr>";
    data.forEach(emp => {
      const status = emp.active ? "Active" : "Inactive";
      html += `<tr><td>${emp.employee_id}</td><td>${emp.name}</td><td>$${emp.hourly_rate}/hr</td><td>${status}</td><td><button onclick="openEditEmployeeForm('${emp.id}')">Edit</button></td></tr>`;
    });
    html += "</table><br>";
    container.innerHTML = html;
}

async function saveNewEmployee() {

  const name = document.getElementById("newEmpName").value.trim();

  const pin = document.getElementById("newEmpPin").value.trim();

async function saveEditedEmployee() {

  const name = document.getElementById("editEmpName").value.trim();

async function openEditEntry(entryId) {
  editingEntryId = entryId;
  const modal = document.getElementById('editEntryModal');
  const clockInInput = document.getElementById('editClockIn');
  const clockOutInput = document.getElementById('editClockOut');
  
  clockInInput.value = '';
  clockOutInput.value = '';
  modal.classList.remove('hidden');

  const { data: entry, error } = await _supabase
    .from('time_entries')
    .select('clock_in, clock_out')
    .eq('id', entryId)
    .single();

  if (error || !entry) {
    alert('Error fetching entry data.');
    closeEditModal();
    return;
  }
  
  function toLocalISOString(date) {
    if (!date) return '';
    const d = new Date(date);
    const tzOffset = d.getTimezoneOffset() * 60000; // Offset in milliseconds
    const localISOTime = new Date(d.getTime() - tzOffset).toISOString().slice(0, 16);
    return localISOTime;
  }

  clockInInput.value = toLocalISOString(parseDbTimestamp(entry.clock_in));
  if (entry.clock_out) {
    clockOutInput.value = toLocalISOString(parseDbTimestamp(entry.clock_out));
  }
}

async function saveEditedEntry() {
  if (!editingEntryId) return;

  const clockInValue = document.getElementById('editClockIn').value;
  const clockOutValue = document.getElementById('editClockOut').value;

  if (!clockInValue) {
    alert('Clock In time cannot be empty.');
    return;
  }
  
  const newClockIn = new Date(clockInValue);
  const newClockOut = clockOutValue ? new Date(clockOutValue) : null;

  if (newClockOut && newClockOut < newClockIn) {
      alert('Clock Out time cannot be earlier than Clock In time.');
      return;
  }
  
  const { data: entry, error: entryError } = await _supabase
    .from("time_entries")
    .select("*, employees(*)")
    .eq("id", editingEntryId)
    .single();
    
  if (entryError || !entry) {
    alert("Error fetching entry data for recalculation.");
    return;
  }

  const employee = entry.employees;
  let updateData = {
      clock_in: newClockIn.toISOString(),
      clock_out: newClockOut ? newClockOut.toISOString() : null
  };

  if (newClockOut) {
      const totalMilliseconds = newClockOut.getTime() - newClockIn.getTime();
      const shiftTotalHours = Math.max(0, totalMilliseconds / (1000 * 60 * 60));

      const weekStart = getWeekStart(newClockIn).toISOString();
      const { data: weekEntries, error: weekError } = await _supabase
        .from("time_entries")
        .select("total_hours")
        .eq("employee_id", entry.employee_id)
        .gte("clock_in", weekStart)
        .not("id", "eq", editingEntryId);

      if (weekError) {
          alert("Error calculating weekly hours: " + weekError.message);
          return;
      }

      const weeklyHoursBeforeThisShift = weekEntries.reduce((sum, e) => sum + (e.total_hours || 0), 0);
      
      const overtimeThreshold = 40;
      let regularHours = 0;
      let overtimeHours = 0;

      if (weeklyHoursBeforeThisShift >= overtimeThreshold) {
        overtimeHours = shiftTotalHours;
      } else {
        const remainingRegularHours = overtimeThreshold - weeklyHoursBeforeThisShift;
        if (shiftTotalHours <= remainingRegularHours) {
          regularHours = shiftTotalHours;
        } else {
          regularHours = remainingRegularHours;
          overtimeHours = shiftTotalHours - remainingRegularHours;
        }
      }

      const regularPay = Math.max(0, regularHours) * employee.hourly_rate;
      const overtimeRate = employee.overtime_rate || (employee.hourly_rate * 1.5);
      const overtimePay = Math.max(0, overtimeHours) * overtimeRate;
      
      updateData.total_hours = shiftTotalHours;
      updateData.regular_hours = Math.max(0, regularHours);
      updateData.overtime_hours = Math.max(0, overtimeHours);
      updateData.gross_pay = regularPay + overtimePay;
  } else {
      updateData.total_hours = null;
      updateData.regular_hours = null;
      updateData.overtime_hours = null;
      updateData.gross_pay = null;
  }

  const { error: updateError } = await _supabase
    .from("time_entries")
    .update(updateData)
    .eq("id", editingEntryId);

  if (updateError) {
    alert("Failed to save changes: " + updateError.message);
  } else {
    alert("Entry updated successfully!");
    closeEditModal();
    await viewTimeEntries();
    await updateDashboardMetrics();
  }
}

async function adminCloseEntry(entryId) {
    if (!confirm("Are you sure you want to close this time entry? This will clock the employee out at the current time.")) {
        return;
    }
    
    editingEntryId = entryId;
    
    const { data: entry, error: entryError } = await _supabase
      .from("time_entries")
      .select('clock_in')
      .eq("id", editingEntryId)
      .single();
      
    if (entryError || !entry) {
      alert("Could not fetch entry to close it.");
      return;
    }
    
    function toLocalISOString(date) {
        if (!date) return '';
        const d = new Date(date);
        const tzOffset = d.getTimezoneOffset() * 60000;
        const localISOTime = new Date(d.getTime() - tzOffset).toISOString().slice(0, 16);
        return localISOTime;
    }

    document.getElementById('editClockIn').value = toLocalISOString(parseDbTimestamp(entry.clock_in));
    document.getElementById('editClockOut').value = toLocalISOString(new Date());
    
    await saveEditedEntry();
}

function exportReport() {
  const endDate = new Date();
  const startDate = new Date();
  startDate.setDate(endDate.getDate() - 6);
  
  const toYYYYMMDD = (d) => d.toISOString().split('T')[0];

  document.getElementById('reportStartDate').value = toYYYYMMDD(startDate);
  document.getElementById('reportEndDate').value = toYYYYMMDD(endDate);

  document.getElementById('reportModal').classList.remove('hidden');
}

async function generateCSVReport() {
  const startDateInput = document.getElementById('reportStartDate').value;
  const endDateInput = document.getElementById('reportEndDate').value;

  if (!startDateInput || !endDateInput) {
    alert('Please select both a start and end date.');
    return;
  }

  const startDate = new Date(startDateInput);
  startDate.setHours(0, 0, 0, 0);

  const endDate = new Date(endDateInput);
  endDate.setHours(23, 59, 59, 999);

  if (endDate < startDate) {
    alert('End date cannot be earlier than start date.');
    return;
  }
  
  alert('Generating report... This may take a moment for large date ranges.');

  const { data: entries, error } = await _supabase
    .from('time_entries')
    .select('*, employees(name, employee_id)')
    .gte('clock_in', startDate.toISOString())
    .lte('clock_in', endDate.toISOString())
    .order('clock_in', { ascending: true });

  if (error) {
    alert('Error fetching report data: ' + error.message);
    return;
  }

  if (entries.length === 0) {
    alert('No time entries found in the selected date range.');
    return;
  }

  let csvContent = "data:text/csv;charset=utf-8,";
  const headers = [
    "Employee ID",
    "Employee Name",
    "Clock In",
    "Clock Out",
    "Total Hours",
    "Regular Hours",
    "Overtime Hours",
    "Gross Pay"
  ];
  csvContent += headers.join(",") + "\r\n";

  entries.forEach(entry => {
    const clockIn = entry.clock_in ? parseDbTimestamp(entry.clock_in).toLocaleString() : 'N/A';
    const clockOut = entry.clock_out ? parseDbTimestamp(entry.clock_out).toLocaleString() : 'N/A';
    const employeeId = entry.employees ? entry.employees.employee_id : 'N/A';
    const employeeName = entry.employees ? entry.employees.name : 'N/A';

    const row = [
      employeeId,
      `"${employeeName}"`,
      `"${clockIn}"`,
      `"${clockOut}"`,
      entry.total_hours ? entry.total_hours.toFixed(4) : '0.00',
      entry.regular_hours ? entry.regular_hours.toFixed(4) : '0.00',
      entry.overtime_hours ? entry.overtime_hours.toFixed(4) : '0.00',
      entry.gross_pay ? entry.gross_pay.toFixed(2) : '0.00'
    ];
    csvContent += row.join(",") + "\r\n";
  });

  const encodedUri = encodeURI(csvContent);
  const link = document.createElement("a");
  link.setAttribute("href", encodedUri);
  const fileName = `time_report_${startDateInput}_to_${endDateInput}.csv`;
  link.setAttribute("download", fileName);
  document.body.appendChild(link);
  
  link.click();
  document.body.removeChild(link);
  closeReportModal();
}

async function viewTimeEntries() {
  const container = document.getElementById("adminActions");
  container.innerHTML = "<h3>Loading time entries...</h3>";
  const { data, error } = await _supabase.from("time_entries").select("*, employees(name)").order("clock_in", { ascending: false }).limit(50);
  if (error) { container.innerHTML = "Error loading entries"; return; }
  let html = "<h3>Recent Time Entries</h3><table><tr><th>Employee</th><th>Clock In</th><th>Clock Out</th><th>Regular</th><th>Overtime</th><th>Gross Pay</th><th>Action</th></tr>";
  data.forEach(entry => {
    let clockOutDisplay = entry.clock_out ? parseDbTimestamp(entry.clock_out)?.toLocaleString() || "INVALID" : "OPEN";
    let actionButton = `<button onclick="openEditEntry('${entry.id}')">Edit</button>`;
    if (!entry.clock_out) { actionButton += ` <button onclick="adminCloseEntry('${entry.id}')">Close</button>`; }
    const regHours = entry.regular_hours ? Number(entry.regular_hours).toFixed(2) : '-';
    const otHours = entry.overtime_hours ? Number(entry.overtime_hours).toFixed(2) : '-';
    const grossPay = entry.gross_pay ? `$${Number(entry.gross_pay).toFixed(2)}` : '-';
    html += `<tr><td>${entry.employees.name} (${entry.employee_id})</td><td>${parseDbTimestamp(entry.clock_in)?.toLocaleString() || "INVALID"}</td><td>${clockOutDisplay}</td><td>${regHours}</td><td>${otHours}</td><td>${grossPay}</td><td>${actionButton}</td></tr>`;
  });
  html += "</table><br><button onclick='showAdminDashboard()'>Back</button>";
  container.innerHTML = html;
}

function logout() {
  sessionStorage.removeItem('adminAuthenticated');
  sessionStorage.removeItem('adminData');
  window.location.href = 'index.html';
}

function initializeApp() {
    const adminData = sessionStorage.getItem('adminData');
    if (!adminData) {
        console.error("Admin data not found. Logging out.");
        logout();
        return;
    }
    const admin = JSON.parse(adminData);
    
    document.getElementById("adminInfo").innerText = `Welcome ${admin.name} (${admin.role})`;

    const actions = document.getElementById("adminActions");
    actions.innerHTML = "";
    if (admin.role === "owner" || admin.role === "manager") {
        actions.innerHTML += `<button onclick="manageEmployees()">Manage Employees</button><br><br>`;
        actions.innerHTML += `<button onclick="viewTimeEntries()">View Time Entries</button><br><br>`;
        actions.innerHTML += `<button onclick="exportReport()">Export Report</button><br><br>`;
    }
    if (admin.role === "owner") {
        actions.innerHTML += `<button onclick="createAdmin()">Create Admin</button><br><br>`;
    }

    document.getElementById("adminPanel").classList.remove("hidden");
    document.getElementById("manageEmployeesPanel").classList.add("hidden");
    document.getElementById("createAdminPanel").classList.add("hidden");

    updateDashboardMetrics();
}

document.addEventListener('DOMContentLoaded', initializeApp);

</script>
</body>
</html>
