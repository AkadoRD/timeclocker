
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 20px; background-color: #f8f9fa; }
    .hidden { display: none !important; }
    .panel { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); max-width: 800px; margin: 20px auto; }
    button { background-color: #2cb3ba; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 1rem; margin: 5px; }
    table { width:100%; font-size:14px; border-collapse: collapse; }
    th, td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
    h2, h3 { color: #2f3640; }
    select, input[type='text'], input[type='number'], input[type='password'], input[type='email'] { width: calc(100% - 16px); padding: 8px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #ddd; }
  </style>
</head>
<body>

<script>
  const _supabase = supabase.createClient("https://jqppakaodpgbtxzpvsti.supabase.co", "sb_publishable_ZwLCHMtM9uCfBFkwBcSSEQ_zQVq1RwI");
  if (!sessionStorage.getItem('adminAuthenticated')) {
    window.location.href = 'index.html';
  }
</script>

<div id="adminPanel" class="panel">
  <h2>Admin Dashboard</h2>
  <p id="adminInfo"></p>
  <div id="dashboardMetrics" style="text-align: center;">
      <h4>Horas Hoy</h4><p id="metricHoursToday">...</p>
      <h4>Fichados Ahora</h4><p id="metricClockedIn">...</p>
      <h4>Nómina Semanal</h4><p id="metricWeeklyPayroll">...</p>
  </div>
  <div id="adminActions"></div>
  <button onclick="logout()">Logout</button>
</div>

<div id="manageClientsPanel" class="panel hidden">
  <h2>Manage Clients</h2>
  <button onclick="showNewClientForm()">Create New Client</button>
  <div id="newClientFormContainer" class="hidden">
    <h3>Create New Client</h3>
    <input type="text" id="newClientName" placeholder="Client Name">
    <button onclick="saveNewClient()">Save Client</button>
    <button onclick="cancelNewClient()">Cancel</button>
  </div>
  <div id="clientListContainer"></div><br>
  <button onclick="showAdminDashboard()">Back to Dashboard</button>
</div>

<div id="manageProjectsPanel" class="panel hidden">
  <h2 id="projectsHeader">Manage Projects</h2>
  <button onclick="showNewProjectForm()">Create New Project</button>
   <div id="newProjectFormContainer" class="hidden">
    <h3>Create New Project</h3>
    <input type="text" id="newProjectName" placeholder="Project Name">
    <button onclick="saveNewProject()">Save Project</button>
    <button onclick="cancelNewProject()">Cancel</button>
  </div>
  <div id="projectListContainer"></div><br>
  <button onclick="manageClients()">Back to Clients</button>
</div>

<div id="manageEmployeesPanel" class="panel hidden">
  <h2>Manage Employees</h2>
  <button onclick="showNewEmployeeForm()">Create New Employee</button>
  <div id="newEmployeeFormContainer" class="hidden">
    <h3>Create New Employee</h3>
    <input type="number" id="newEmpId" placeholder="Employee ID (4 digits)">
    <input type="text" id="newEmpName" placeholder="Full Name">
    <input type="number" id="newEmpRate" placeholder="Hourly Rate">
    <select id="newEmpProject"></select>
    <input type="password" id="newEmpPin" placeholder="4-digit PIN">
    <button onclick="saveNewEmployee()">Save Employee</button>
    <button onclick="cancelNewEmployee()">Cancel</button>
  </div>
  <div id="editEmployeeFormContainer" class="hidden">
    <h3>Edit Employee</h3>
    <input type="text" id="editEmpId" readonly>
    <input type="text" id="editEmpName">
    <input type="number" id="editEmpRate">
    <select id="editEmpProject"></select>
    <input type="password" id="editEmpPin" placeholder="New PIN (optional)">
    <label><input type="checkbox" id="editEmpActive"> Active</label>
    <button onclick="saveEditedEmployee()">Save Changes</button>
    <button onclick="cancelEditEmployee()">Cancel</button>
  </div>
  <div id="employeeListContainer"></div><br>
  <button onclick="showAdminDashboard()">Back to Dashboard</button>
</div>

<script>
let editingEmployeeId = null;
let currentClientIdForProjects = null;

// --- NAVIGATION & INITIALIZATION ---
document.addEventListener('DOMContentLoaded', initializeApp);

function initializeApp() {
    const adminData = JSON.parse(sessionStorage.getItem('adminData'));
    if (!adminData) { logout(); return; }
    // CORRECTED LINE: Used adminData.name instead of admin.name
    document.getElementById("adminInfo").innerText = `Welcome ${adminData.name} (${adminData.role})`;
    const actions = document.getElementById("adminActions");
    actions.innerHTML = `
        <button onclick="manageClients()">Manage Clients & Projects</button>
        <button onclick="manageEmployees()">Manage Employees</button>
        <button onclick="alert('Reports not implemented')">Reports</button>
    `;
}

function showAdminDashboard() {
  document.querySelectorAll('.panel').forEach(p => p.id === 'adminPanel' ? p.classList.remove('hidden') : p.classList.add('hidden'));
  initializeApp();
}

function logout() {
  sessionStorage.clear();
  window.location.href = 'index.html';
}

// --- CLIENT MANAGEMENT ---
async function manageClients() {
  document.querySelectorAll('.panel').forEach(p => p.id === 'manageClientsPanel' ? p.classList.remove('hidden') : p.classList.add('hidden'));
  await renderClientList();
}

async function renderClientList() {
    const container = document.getElementById("clientListContainer");
    container.innerHTML = "<h3>Loading...</h3>";
    const { data, error } = await _supabase.from("clients").select("*").order("name");
    let html = "<table><tr><th>Name</th><th>Status</th><th>Actions</th></tr>";
    data.forEach(c => { html += `<tr><td>${c.name}</td><td>${c.active ? 'Active' : 'Inactive'}</td><td><button onclick="manageProjects('${c.id}', '${c.name.replace(/'/g, "\\'")}')">Projects</button></td></tr>`; });
    container.innerHTML = html + "</table>";
}
//... other client functions omitted for brevity, but they exist in the full file

// --- PROJECT MANAGEMENT ---
async function manageProjects(clientId, clientName) {
  currentClientIdForProjects = clientId;
  document.querySelectorAll('.panel').forEach(p => p.id === 'manageProjectsPanel' ? p.classList.remove('hidden') : p.classList.add('hidden'));
  document.getElementById('projectsHeader').innerText = `Projects for ${clientName}`;
  await renderProjectList(clientId);
}

async function renderProjectList(clientId) {
    const container = document.getElementById("projectListContainer");
    container.innerHTML = "<h3>Loading...</h3>";
    const { data, error } = await _supabase.from("projects").select("*").eq('client_id', clientId).order("name");
    let html = "<table><tr><th>Name</th><th>Status</th><th>Actions</th></tr>";
    data.forEach(p => { html += `<tr><td>${p.name}</td><td>${p.active ? 'Active' : 'Inactive'}</td><td>...</td></tr>`; });
    container.innerHTML = html + "</table>";
}
//... other project functions

// --- EMPLOYEE MANAGEMENT ---
async function manageEmployees() {
  document.querySelectorAll('.panel').forEach(p => p.id === 'manageEmployeesPanel' ? p.classList.remove('hidden') : p.classList.add('hidden'));
  await renderEmployeeList();
}

async function renderEmployeeList() {
    const container = document.getElementById("employeeListContainer");
    container.innerHTML = "<h3>Loading...</h3>";
    const { data, error } = await _supabase.from("employees").select("*, project:projects(name)").order("employee_id");
    let html = `<table><tr><th>ID</th><th>Name</th><th>Project</th><th>Status</th><th>Action</th></tr>`;
    data.forEach(emp => { html += `<tr><td>${emp.employee_id}</td><td>${emp.name}</td><td>${emp.project ? emp.project.name : 'None'}</td><td>${emp.active ? 'Active' : 'Inactive'}</td><td><button onclick="openEditEmployeeForm('${emp.id}')">Edit</button></td></tr>`; });
    container.innerHTML = html + "</table>";
}

async function populateProjectDropdown(selectElementId) {
    const selectEl = document.getElementById(selectElementId);
    selectEl.innerHTML = '<option value="">Assign Project</option>';
    const { data, error } = await _supabase.from('projects').select('id, name, client:clients(name)').eq('active', true).order('name');
    const projectsByClient = data.reduce((acc, p) => {
        const clientName = p.client ? p.client.name : 'Uncategorized';
        if (!acc[clientName]) acc[clientName] = [];
        acc[clientName].push(p);
        return acc;
    }, {});
    for (const clientName in projectsByClient) {
        const optgroup = document.createElement('optgroup');
        optgroup.label = clientName;
        projectsByClient[clientName].forEach(p => { optgroup.innerHTML += `<option value="${p.id}">${p.name}</option>`; });
        selectEl.appendChild(optgroup);
    }
}
async function openEditEmployeeForm(employeeId) {
    editingEmployeeId = employeeId;
    const { data, error } = await _supabase.from("employees").select("*").eq("id", employeeId).single();
    await populateProjectDropdown('editEmpProject');
    document.getElementById("editEmpId").value = data.employee_id;
    document.getElementById("editEmpName").value = data.name;
    document.getElementById("editEmpRate").value = data.hourly_rate;
    document.getElementById("editEmpProject").value = data.current_project_id || "";
    document.getElementById("editEmpActive").checked = data.active;
    document.getElementById("editEmployeeFormContainer").classList.remove("hidden");
    document.getElementById("employeeListContainer").classList.add("hidden");
}
async function saveEditedEmployee() {
  let updateData = {
      name: document.getElementById("editEmpName").value,
      hourly_rate: parseFloat(document.getElementById("editEmpRate").value),
      active: document.getElementById("editEmpActive").checked,
      current_project_id: document.getElementById("editEmpProject").value ? parseInt(document.getElementById("editEmpProject").value) : null
  };
  const pin = document.getElementById("editEmpPin").value;
  if (pin) updateData.pin = pin;
  const { error } = await _supabase.from("employees").update(updateData).eq("id", editingEmployeeId);
  if (error) { alert("Error: " + error.message); } else { showAdminDashboard(); }
}
// ... other functions like cancelEditEmployee, showNewEmployeeForm, etc.

</script>
</body>
</html>
