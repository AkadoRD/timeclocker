
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 20px; background-color: #f8f9fa; }
    .hidden { display: none !important; }
    .panel { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); max-width: 800px; margin: 20px auto; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 10000; }
    .modal-content { background: white; padding: 20px; border-radius: 8px; text-align: center; }
    button { background-color: #2cb3ba; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 1rem; margin: 5px; }
    button:hover { opacity: 0.9; }
    table { width:100%; font-size:14px; border-collapse: collapse; }
    th, td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
    h2, h3, h4 { color: #2f3640; }
    select, input[type='text'], input[type='number'], input[type='password'], input[type='email'] { width: calc(100% - 16px); padding: 8px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #ddd; box-sizing: content-box; }
  </style>
</head>
<body>

<script>
  const _supabase = supabase.createClient("https://jqppakaodpgbtxzpvsti.supabase.co", "sb_publishable_ZwLCHMtM9uCfBFkwBcSSEQ_zQVq1RwI");
  if (!sessionStorage.getItem('adminAuthenticated')) {
    window.location.href = 'index.html';
  }
</script>

<div id="adminPanel" class="panel">
  <h2>Admin Dashboard</h2>
  <p id="adminInfo"></p>
  <div id="dashboardMetrics" style="display: flex; justify-content: space-around; margin-bottom: 20px; text-align: center;">
      <div><h4>Horas Hoy</h4><p id="metricHoursToday" style="font-size: 1.5rem; margin: 0;">...</p></div>
      <div><h4>Fichados Ahora</h4><p id="metricClockedIn" style="font-size: 1.5rem; margin: 0;">...</p></div>
      <div><h4>Nómina Semanal</h4><p id="metricWeeklyPayroll" style="font-size: 1.5rem; margin: 0;">...</p></div>
  </div>
  <div id="adminActions"></div>
  <button onclick="logout()">Logout</button>
</div>

<div id="manageClientsPanel" class="panel hidden">
  <h2>Manage Clients</h2>
  <button onclick="showNewClientForm()">Create New Client</button>
  <hr>
  <div id="newClientFormContainer" class="hidden">
    <h3>Create New Client</h3>
    <input type="text" id="newClientName" placeholder="Client Name"><br>
    <input type="text" id="newClientContact" placeholder="Contact Person"><br>
    <input type="email" id="newClientEmail" placeholder="Contact Email"><br>
    <button onclick="saveNewClient()">Save Client</button>
    <button onclick="cancelNewClient()">Cancel</button>
  </div>
  <div id="editClientFormContainer" class="hidden">
    <h3>Edit Client</h3>
    <input type="hidden" id="editClientId">
    <input type="text" id="editClientName" placeholder="Client Name"><br>
    <input type="text" id="editClientContact" placeholder="Contact Person"><br>
    <input type="email" id="editClientEmail" placeholder="Contact Email"><br>
    <label><input type="checkbox" id="editClientActive"> Active</label><br><br>
    <button onclick="saveEditedClient()">Save Changes</button>
    <button onclick="cancelEditClient()">Cancel</button>
  </div>
  <div id="clientListContainer"></div><br>
  <button onclick="showAdminDashboard()">Back to Admin Panel</button>
</div>

<div id="manageProjectsPanel" class="panel hidden">
  <h2 id="projectsHeader">Manage Projects</h2>
  <button onclick="showNewProjectForm()">Create New Project</button>
  <hr>
  <div id="newProjectFormContainer" class="hidden">
    <h3>Create New Project</h3>
    <input type="text" id="newProjectName" placeholder="Project or Assigment Name"><br>
    <button onclick="saveNewProject()">Save Project</button>
    <button onclick="cancelNewProject()">Cancel</button>
  </div>
  <div id="editProjectFormContainer" class="hidden">
    <h3>Edit Project</h3>
    <input type="hidden" id="editProjectId">
    <input type="text" id="editProjectName" placeholder="Project or Assigment Name"><br>
    <label><input type="checkbox" id="editProjectActive"> Active</label><br><br>
    <button onclick="saveEditedProject()">Save Changes</button>
    <button onclick="cancelEditProject()">Cancel</button>
  </div>
  <div id="projectListContainer"></div><br>
  <button onclick="manageClients()">Back to Client List</button>
</div>

<div id="manageEmployeesPanel" class="panel hidden">
  <h2>Manage Employees</h2>
  <button onclick="showNewEmployeeForm()">Create New Employee</button>
  <hr>
  <div id="newEmployeeFormContainer" class="hidden">
    <h3>Create New Employee</h3>
    <input type="number" id="newEmpId" placeholder="Employee ID (4 digits)" oninput="if(this.value.length > 4) this.value = this.value.slice(0,4);"><br>
    <input type="text" id="newEmpName" placeholder="Full Name"><br>
    <input type="number" id="newEmpRate" placeholder="Hourly Rate (e.g., 15.50)" step="0.01"><br>
    <label for="newEmpProject">Assign Project</label>
    <select id="newEmpProject"></select><br>
    <input type="password" id="newEmpPin" placeholder="4-digit PIN" maxlength="4" inputmode="numeric" pattern="[0-9]*"><br>
    <button onclick="saveNewEmployee()">Save Employee</button>
    <button onclick="cancelNewEmployee()">Cancel</button>
  </div>
  <div id="editEmployeeFormContainer" class="hidden">
    <h3>Edit Employee</h3>
    Employee ID: <input type="text" id="editEmpId" readonly><br>
    <input type="text" id="editEmpName" placeholder="Full Name"><br>
    <input type="number" id="editEmpRate" placeholder="Hourly Rate (e.g., 15.50)" step="0.01"><br>
    <label for="editEmpProject">Assign Project</label>
    <select id="editEmpProject"></select><br>
    <input type="password" id="editEmpPin" placeholder="New 4-digit PIN (optional)" maxlength="4" inputmode="numeric" pattern="[0-9]*"><br>
    <label><input type="checkbox" id="editEmpActive"> Active</label><br><br>
    <button onclick="saveEditedEmployee()">Save Changes</button>
    <button onclick="cancelEditEmployee()">Cancel</button>
  </div>
  <div id="employeeListContainer"></div><br>
  <button onclick="showAdminDashboard()">Back to Admin Panel</button>
</div>

<div id="createAdminPanel" class="panel hidden">
    <!-- Content for creating admin -->
</div>
<div id="editEntryModal" class="modal hidden">
    <!-- Content for editing time entries -->
</div>
<div id="reportModal" class="modal hidden">
    <!-- Content for reports -->
</div>

<script>
let editingEmployeeId = null;
let editingClientId = null;
let editingProjectId = null;
let currentClientIdForProjects = null;

// UTILITY FUNCTIONS
function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const weekStart = new Date(d.setDate(diff));
  weekStart.setHours(0, 0, 0, 0);
  return weekStart;
}

// NAVIGATION
function showAdminDashboard() {
  document.getElementById("manageProjectsPanel").classList.add("hidden");
  document.getElementById("manageClientsPanel").classList.add("hidden");
  document.getElementById("manageEmployeesPanel").classList.add("hidden");
  document.getElementById("createAdminPanel").classList.add("hidden");
  document.getElementById("adminPanel").classList.remove("hidden");
  initializeApp();
}

// CLIENT MANAGEMENT
async function manageClients() {
  document.getElementById("adminPanel").classList.add("hidden");
  document.getElementById("manageProjectsPanel").classList.add("hidden");
  document.getElementById("manageClientsPanel").classList.remove("hidden");
  await renderClientList();
}

async function renderClientList() {
    const container = document.getElementById("clientListContainer");
    container.innerHTML = "<h3>Loading clients...</h3>";
    const { data, error } = await _supabase.from("clients").select("*").order("name");
    if (error) { container.innerHTML = "Error loading clients."; return; }
    let html = "<h3>Current Clients</h3><table><tr><th>Name</th><th>Contact</th><th>Email</th><th>Status</th><th>Actions</th></tr>";
    data.forEach(client => {
      html += `<tr><td>${client.name}</td><td>${client.contact_person || ''}</td><td>${client.contact_email || ''}</td><td>${client.active ? "Active" : "Inactive"}</td>
        <td><button onclick="openEditClientForm('${client.id}')">Edit</button><button onclick="manageProjects('${client.id}', '${client.name.replace(/'/g, "\\'")}')">Projects</button></td></tr>`;
    });
    container.innerHTML = html + "</table><br>";
}
function showNewClientForm() { document.getElementById("newClientFormContainer").classList.remove("hidden"); }
function cancelNewClient() { document.getElementById("newClientFormContainer").classList.add("hidden"); }
// ... other client functions

// PROJECT MANAGEMENT
async function manageProjects(clientId, clientName) {
  currentClientIdForProjects = clientId;
  document.getElementById("manageClientsPanel").classList.add("hidden");
  document.getElementById("manageProjectsPanel").classList.remove("hidden");
  document.getElementById("projectsHeader").innerText = `Projects for ${clientName}`;
  await renderProjectList(clientId);
}
async function renderProjectList(clientId) {
    const container = document.getElementById("projectListContainer");
    container.innerHTML = "<h3>Loading projects...</h3>";
    const { data, error } = await _supabase.from("projects").select("*").eq('client_id', clientId).order("name");
    if (error) { container.innerHTML = "Error loading projects."; return; }
    let html = "<h3>Projects</h3><table><tr><th>Name</th><th>Status</th><th>Actions</th></tr>";
    data.forEach(project => {
        html += `<tr><td>${project.name}</td><td>${project.active ? "Active" : "Inactive"}</td><td><button onclick="openEditProjectForm('${project.id}')">Edit</button></td></tr>`;
    });
    container.innerHTML = html + "</table><br>";
}
function showNewProjectForm() { document.getElementById("newProjectFormContainer").classList.remove("hidden"); }
function cancelNewProject() { document.getElementById("newProjectFormContainer").classList.add("hidden"); }
// ... other project functions

// EMPLOYEE MANAGEMENT
async function manageEmployees() {
  document.getElementById("adminPanel").classList.add("hidden");
  document.getElementById("manageEmployeesPanel").classList.remove("hidden");
  await renderEmployeeList();
}

async function renderEmployeeList() {
    const container = document.getElementById("employeeListContainer");
    container.innerHTML = "<h3>Loading employees...</h3>";
    const { data, error } = await _supabase.from("employees").select("*, project:projects(name)").order("employee_id");
    if (error) { container.innerHTML = "Error loading employees."; console.error(error); return; }
    let html = `<h3>Current Employees</h3><table><tr><th>ID</th><th>Name</th><th>Rate</th><th>Assigned Project</th><th>Status</th><th>Action</th></tr>`;
    data.forEach(emp => {
      html += `<tr><td>${emp.employee_id}</td><td>${emp.name}</td><td>$${emp.hourly_rate}/hr</td><td>${emp.project ? emp.project.name : '<em>None</em>'}</td><td>${emp.active ? "Active" : "Inactive"}</td>
        <td><button onclick="openEditEmployeeForm('${emp.id}')">Edit</button></td></tr>`;
    });
    container.innerHTML = html + "</table><br>";
}

async function populateProjectDropdown(selectElementId) {
    const selectEl = document.getElementById(selectElementId);
    selectEl.innerHTML = '<option value="">None</option>';
    const { data: clients, error: clientError } = await _supabase.from('clients').select('id, name').eq('active', true);
    const { data: projects, error: projectError } = await _supabase.from('projects').select('id, name, client_id').eq('active', true);
    if (clientError || projectError) return;
    clients.forEach(client => {
        const clientProjects = projects.filter(p => p.client_id === client.id);
        if (clientProjects.length > 0) {
            const optgroup = document.createElement('optgroup');
            optgroup.label = client.name;
            clientProjects.forEach(project => {
                const option = document.createElement('option');
                option.value = project.id;
                option.textContent = project.name;
                optgroup.appendChild(option);
            });
            selectEl.appendChild(optgroup);
        }
    });
}

async function showNewEmployeeForm() {
  document.getElementById("employeeListContainer").classList.add("hidden");
  document.getElementById("newEmployeeFormContainer").classList.remove("hidden");
  await populateProjectDropdown('newEmpProject');
  // Reset form fields
  document.getElementById("newEmpId").value = "";
  document.getElementById("newEmpName").value = "";
  document.getElementById("newEmpRate").value = "";
  document.getElementById("newEmpPin").value = "";
  document.getElementById("newEmpProject").value = "";
}
function cancelNewEmployee() { 
    document.getElementById("newEmployeeFormContainer").classList.add("hidden");
    document.getElementById("employeeListContainer").classList.remove("hidden");
}

async function saveNewEmployee() {
  const insertData = {
      employee_id: document.getElementById("newEmpId").value,
      name: document.getElementById("newEmpName").value,
      hourly_rate: parseFloat(document.getElementById("newEmpRate").value),
      pin: document.getElementById("newEmpPin").value,
      current_project_id: document.getElementById("newEmpProject").value ? parseInt(document.getElementById("newEmpProject").value) : null
  };
  const { error } = await _supabase.from("employees").insert([insertData]);
  if (error) { alert("Error: " + error.message); }
  else { alert("Success!"); cancelNewEmployee(); renderEmployeeList(); }
}

async function openEditEmployeeForm(employeeId) {
  editingEmployeeId = employeeId;
  const { data, error } = await _supabase.from("employees").select("*").eq("id", employeeId).single();
  if (error) { alert("Error fetching data."); return; }
  await populateProjectDropdown('editEmpProject');
  document.getElementById("editEmpId").value = data.employee_id;
  document.getElementById("editEmpName").value = data.name;
  document.getElementById("editEmpRate").value = data.hourly_rate;
  document.getElementById("editEmpProject").value = data.current_project_id || "";
  document.getElementById("editEmpActive").checked = data.active;
  document.getElementById("editEmployeeFormContainer").classList.remove("hidden");
  document.getElementById("employeeListContainer").classList.add("hidden");
}

function cancelEditEmployee() {
    document.getElementById("editEmployeeFormContainer").classList.add("hidden");
    document.getElementById("employeeListContainer").classList.remove("hidden");
}

async function saveEditedEmployee() {
  let updateData = {
      name: document.getElementById("editEmpName").value,
      hourly_rate: parseFloat(document.getElementById("editEmpRate").value),
      active: document.getElementById("editEmpActive").checked,
      current_project_id: document.getElementById("editEmpProject").value ? parseInt(document.getElementById("editEmpProject").value) : null
  };
  const pin = document.getElementById("editEmpPin").value;
  if (pin) updateData.pin = pin;

  const { error } = await _supabase.from("employees").update(updateData).eq("id", editingEmployeeId);
  if (error) { alert("Error: " + error.message); }
  else { alert("Success!"); cancelEditEmployee(); renderEmployeeList(); }
}

// APP-WIDE
function logout() {
  sessionStorage.clear();
  window.location.href = 'index.html';
}

function initializeApp() {
    const adminData = JSON.parse(sessionStorage.getItem('adminData'));
    if (!adminData) { logout(); return; }
    document.getElementById("adminInfo").innerText = `Welcome ${admin.name} (${admin.role})`;
    const actions = document.getElementById("adminActions");
    actions.innerHTML = `
        <button onclick="manageClients()">Manage Clients</button>
        <button onclick="manageEmployees()">Manage Employees</button>
        <button onclick="alert('View Time Entries - Not Implemented Yet')">View Time Entries</button>
        <button onclick="alert('Export Report - Not Implemented Yet')">Export Report</button>
    `;
    // updateDashboardMetrics();
}

document.addEventListener('DOMContentLoaded', initializeApp);

</script>
</body>
</html>
