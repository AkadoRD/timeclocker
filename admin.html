<div id="manageEmployeesPanel" class="panel hidden">

  <hr>

<div id="editEntryModal" class="modal hidden"> /* ...Panel Content... */ </div>
<div id="reportModal" class="modal hidden"> /* ...Panel Content... */ </div>

<script>
let editingEntryId = null;
let editingEmployeeId = null;
let editingClientId = null;
let editingProjectId = null;
let currentClientIdForProjects = null;

// ... other utility functions unchanged

// ----- EMPLOYEE MANAGEMENT -----

async function populateProjectDropdown(selectElementId) {
    const selectEl = document.getElementById(selectElementId);
    selectEl.innerHTML = '<option value="">None</option>'; // Default empty option

    const { data: clients, error: clientError } = await _supabase.from('clients').select('id, name').eq('active', true);
    const { data: projects, error: projectError } = await _supabase.from('projects').select('id, name, client_id').eq('active', true);

    if (clientError || projectError) {
        console.error("Error fetching project data for dropdown");
        return;
    }

    clients.forEach(client => {
        const clientProjects = projects.filter(p => p.client_id === client.id);
        if (clientProjects.length > 0) {
            const optgroup = document.createElement('optgroup');
            optgroup.label = client.name;
            clientProjects.forEach(project => {
                const option = document.createElement('option');
                option.value = project.id;
                option.textContent = project.name;
                optgroup.appendChild(option);
            });
            selectEl.appendChild(optgroup);
        }
    });
}

async function manageEmployees() {
  document.getElementById("adminPanel").classList.add("hidden");
  document.getElementById("manageEmployeesPanel").classList.remove("hidden");
  //... rest is unchanged
  await renderEmployeeList();
}

async function renderEmployeeList() {
    const container = document.getElementById("employeeListContainer");
    container.innerHTML = "<h3>Loading employees...</h3>";
    const { data, error } = await _supabase.from("employees").select("*, projects(name)").order("employee_id", { ascending: true });

    if (error) { container.innerHTML = "Error loading employees."; return; }
    
    let html = `<h3>Current Employees</h3><table><tr><th>ID</th><th>Name</th><th>Rate</th><th>Assigned Project</th><th>Status</th><th>Action</th></tr>`;
    data.forEach(emp => {
      const status = emp.active ? "Active" : "Inactive";
      const projectName = emp.projects ? emp.projects.name : '<em>None</em>';
      html += `<tr>
        <td>${emp.employee_id}</td>
        <td>${emp.name}</td>
        <td>$${emp.hourly_rate}/hr</td>
        <td>${projectName}</td>
        <td>${status}</td>
        <td><button onclick="openEditEmployeeForm('${emp.id}')">Edit</button></td>
      </tr>`;
    });
    html += "</table><br>";
    container.innerHTML = html;
}

async function showNewEmployeeForm() {
  document.getElementById("employeeListContainer").classList.add("hidden");
  document.getElementById("newEmployeeFormContainer").classList.remove("hidden");
  await populateProjectDropdown('newEmpProject');
  // ... reset other form fields
}

function cancelNewEmployee() { /* Unchanged */ }

async function saveNewEmployee() {
  const empId = document.getElementById("newEmpId").value.trim();
  const name = document.getElementById("newEmpName").value.trim();
  const rate = document.getElementById("newEmpRate").value.trim();
  const pin = document.getElementById("newEmpPin").value.trim();
  const projectId = document.getElementById("newEmpProject").value;

  if (!empId || !name || !rate || !pin) { alert("ID, Name, Rate, and PIN are required."); return; }
  
  const insertData = {
      employee_id: empId,
      name: name,
      hourly_rate: parseFloat(rate),
      pin: pin,
      current_project_id: projectId ? parseInt(projectId) : null
  };

  const { error } = await _supabase.from("employees").insert([insertData]);
  if (error) { alert("Error creating employee: " + error.message); } 
  else { alert("Employee created successfully!"); cancelNewEmployee(); renderEmployeeList(); }
}

async function openEditEmployeeForm(employeeId) {
  editingEmployeeId = employeeId;
  const { data, error } = await _supabase.from("employees").select("*" ).eq("id", employeeId).single();
  if (error) { alert("Error fetching employee data."); return; }

  await populateProjectDropdown('editEmpProject');

  document.getElementById("editEmpId").value = data.employee_id;
  document.getElementById("editEmpName").value = data.name;
  document.getElementById("editEmpRate").value = data.hourly_rate;
  document.getElementById("editEmpProject").value = data.current_project_id || "";
  document.getElementById("editEmpActive").checked = data.active;
  document.getElementById("editEmpPin").value = "";

  document.getElementById("employeeListContainer").classList.add("hidden");
  document.getElementById("editEmployeeFormContainer").classList.remove("hidden");
}

function cancelEditEmployee() { /* Unchanged */ }

async function saveEditedEmployee() {
  if (!editingEmployeeId) return;
  
  const name = document.getElementById("editEmpName").value.trim();
  const rate = document.getElementById("editEmpRate").value.trim();
  const pin = document.getElementById("editEmpPin").value.trim();
  const active = document.getElementById("editEmpActive").checked;
  const projectId = document.getElementById("editEmpProject").value;

  if (!name || !rate) { alert("Name and Hourly Rate are required."); return; }

  let updateData = {
      name: name,
      hourly_rate: parseFloat(rate),
      active: active,
      current_project_id: projectId ? parseInt(projectId) : null
  };

  if (pin) {
    if (!/^[0-9]{4}$/.test(pin)) { alert("If changing PIN, it must be 4 digits."); return; }
    updateData.pin = pin;
  }

  const { error } = await _supabase.from("employees").update(updateData).eq("id", editingEmployeeId);
  if (error) { alert("Error updating employee: " + error.message); } 
  else { alert("Employee updated successfully!"); cancelEditEmployee(); renderEmployeeList(); }
}

// ... all other sections (CLIENT, PROJECT, ADMIN, TIME ENTRY, REPORTING, APP-WIDE) are unchanged ...

</script>
