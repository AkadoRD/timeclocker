  const _supabase = supabase.createClient("https://jqppakaodpgbtxzpvsti.supabase.co", "sb_publishable_ZwLCHMtM9uCfBFkwBcSSEQ_zQVq1RwI");

  // Security check: Redirect if not logged in
  if (!sessionStorage.getItem('adminAuthenticated')) {
    window.location.href = 'index.html';
  }
</script>

<div id="adminPanel">
  <h2>Admin Dashboard</h2>
  <p id="adminInfo"></p>

  <div id="dashboardMetrics" style="display: flex; justify-content: space-around; margin-bottom: 20px; text-align: center;">
      <div>
          <h4>Horas Hoy</h4>
          <p id="metricHoursToday" style="font-size: 1.5rem; margin: 0;">...</p>
      </div>
      <div>
          <h4>Fichados Ahora</h4>
          <p id="metricClockedIn" style="font-size: 1.5rem; margin: 0;">...</p>
      </div>
      <div>
          <h4>Nómina Semanal</h4>
          <p id="metricWeeklyPayroll" style="font-size: 1.5rem; margin: 0;">...</p>
      </div>
  </div>

  <button onclick="logout()">Logout</button>

<div id="manageEmployeesPanel" class="hidden">
  <h2>Manage Employees</h2>
  <button onclick="showNewEmployeeForm()">Create New Employee</button>
  <hr>
  
  <div id="newEmployeeFormContainer" class="hidden">
    <h3>Create New Employee</h3>
    <input type="number" id="newEmpId" placeholder="Employee ID (4 digits)" oninput="if(this.value.length > 4) this.value = this.value.slice(0,4);"><br><br>
    <input type="text" id="newEmpName" placeholder="Full Name"><br><br>
    <input type="number" id="newEmpRate" placeholder="Hourly Rate (e.g., 15.50)" step="0.01"><br><br>
    <input type="password" id="newEmpPin" placeholder="4-digit PIN" maxlength="4" inputmode="numeric" pattern="[0-9]*"><br><br>
    <button onclick="saveNewEmployee()">Save Employee</button>
    <button onclick="cancelNewEmployee()">Cancel</button>
  </div>

  <div id="editEmployeeFormContainer" class="hidden">
    <h3>Edit Employee</h3>
    Employee ID: <input type="text" id="editEmpId" readonly><br><br>
    <input type="text" id="editEmpName" placeholder="Full Name"><br><br>
    <input type="number" id="editEmpRate" placeholder="Hourly Rate (e.g., 15.50)" step="0.01"><br><br>
    <input type="password" id="editEmpPin" placeholder="New 4-digit PIN (optional)" maxlength="4" inputmode="numeric" pattern="[0-9]*"><br><br>
    <label><input type="checkbox" id="editEmpActive"> Active</label><br><br>
    <button onclick="saveEditedEmployee()">Save Changes</button>
    <button onclick="cancelEditEmployee()">Cancel</button>
  </div>

  <div id="employeeListContainer"></div>
  <br>
  <button onclick="showAdminPanel()">Back to Admin Panel</button>
</div>

<div id="editEntryModal" class="modal hidden">
  <div class="modal-content">
    <h3>Edit Time Entry</h3>
    <label>Clock In</label>
    <input type="datetime-local" id="editClockIn" />
    <label>Clock Out</label>
    <input type="datetime-local" id="editClockOut" />
    <button onclick="saveEditedEntry()">Save</button>
    <button onclick="closeEditModal()">Cancel</button>
  </div>
</div>

<script>
let editingEntryId = null;
let editingEmployeeId = null;

// Utility functions (getWeekStart, parseDbTimestamp etc. - needed for admin actions)
function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day;
  const weekStart = new Date(d.setDate(diff));
  weekStart.setHours(0,0,0,0);
  return weekStart;
}

function getWeekEnd(date) {
    const d = new Date(date);
    const day = d.getDay();
    const diff = d.getDate() - day + 6;
    const weekEnd = new Date(d.setDate(diff));
    weekEnd.setHours(23, 59, 59, 999);
    return weekEnd;
}

function parseDbTimestamp(value) {
  if (!value) return null;
  if (value instanceof Date) return value;
  let s = String(value).trim();
  if (!s) return null;
  if (!s.includes("T")) { s = s.replace(" ", "T"); }
  if (!/[zZ]|[+-]\\d\\d:?\\d\\d$/.test(s)) { s += "Z"; }
  const d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}


async function updateDashboardMetrics() {
  document.getElementById("metricHoursToday").innerText = "...";
  document.getElementById("metricClockedIn").innerText = "...";
  document.getElementById("metricWeeklyPayroll").innerText = "...";

  const { count: clockedInCount, error: clockedInError } = await _supabase.from("time_entries").select('*', { count: 'exact', head: true }).is("clock_out", null);
  document.getElementById("metricClockedIn").innerText = clockedInError ? 'Error' : clockedInCount;

  const now = new Date();
  const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
  const endOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);

  const { data: todayEntries, error: todayError } = await _supabase.from("time_entries").select("total_hours").gte("clock_in", startOfDay.toISOString()).lte("clock_in", endOfDay.toISOString());
  
  let totalHoursToday = 0;
  if (todayEntries) { totalHoursToday = todayEntries.reduce((sum, entry) => sum + (entry.total_hours || 0), 0); }
  document.getElementById("metricHoursToday").innerText = todayError ? 'Error' : totalHoursToday.toFixed(2);

  const weekStart = getWeekStart(new Date()).toISOString();
  const { data: weekEntries, error: weekError } = await _supabase.from("time_entries").select("gross_pay").gte("clock_in", weekStart);

  let weeklyPayroll = 0;
  if (weekEntries) { weeklyPayroll = weekEntries.reduce((sum, entry) => sum + (entry.gross_pay || 0), 0); }
  document.getElementById("metricWeeklyPayroll").innerText = weekError ? 'Error' : \`$\${(weeklyPayroll || 0).toFixed(2)}\`;
}

function showAdminPanel() {
  document.getElementById("manageEmployeesPanel").classList.add("hidden");
  document.getElementById("adminPanel").classList.remove("hidden");
  const admin = JSON.parse(sessionStorage.getItem('adminData'));
  if (admin) {
    document.getElementById("adminInfo").innerText = \`Welcome \${admin.name} (\${admin.role})\`;
    const actions = document.getElementById("adminActions");
    actions.innerHTML = "";
    if (admin.role === "owner" || admin.role === "manager") {
      actions.innerHTML += \`<button onclick="manageEmployees()">Manage Employees</button><br><br>\`;
      actions.innerHTML += \`<button onclick="viewTimeEntries()">View Time Entries</button><br><br>\`;
      actions.innerHTML += \`<button onclick="exportReport()">Export Report</button><br><br>\`;
    }
    if (admin.role === "owner") {
      actions.innerHTML += \`<button onclick="createAdmin()">Create Admin</button><br><br>\`;
    }
    updateDashboardMetrics();
  }
}

async function manageEmployees() {
  document.getElementById("adminPanel").classList.add("hidden");
  document.getElementById("manageEmployeesPanel").classList.remove("hidden");
  document.getElementById("newEmployeeFormContainer").classList.add("hidden");
  document.getElementById("editEmployeeFormContainer").classList.add("hidden");
  document.getElementById("employeeListContainer").classList.remove("hidden");
  await renderEmployeeList();
}

async function renderEmployeeList() {
    const container = document.getElementById("employeeListContainer");
    container.innerHTML = "<h3>Loading employees...</h3>";
    const { data, error } = await _supabase.from("employees").select("*").order("employee_id", { ascending: true });
    if (error) { container.innerHTML = "Error loading employees."; return; }
    let html = "<h3>Current Employees</h3><table border='1' style='width:100%; font-size:12px; border-collapse: collapse;'><tr style='text-align: left;'><th>ID</th><th>Name</th><th>Rate</th><th>Status</th><th>Action</th></tr>";
    data.forEach(emp => {
      const status = emp.active ? "Active" : "Inactive";
      html += \`<tr style="border-top: 1px solid #ccc;"><td style="padding: 4px;">\${emp.employee_id}</td><td style="padding: 4px;">\${emp.name}</td><td style="padding: 4px;">$\${emp.hourly_rate}/hr</td><td style="padding: 4px;">\${status}</td><td style="padding: 4px;"><button onclick="openEditEmployeeForm('\${emp.id}')">Edit</button></td></tr>\`;
    });
    html += "</table><br>";
    container.innerHTML = html;
}

function showNewEmployeeForm() {
  document.getElementById("employeeListContainer").classList.add("hidden");
  document.getElementById("editEmployeeFormContainer").classList.add("hidden");
  document.getElementById("newEmployeeFormContainer").classList.remove("hidden");
  document.getElementById("newEmpId").value = "";
  document.getElementById("newEmpName").value = "";
  document.getElementById("newEmpRate").value = "";
  document.getElementById("newEmpPin").value = "";
}

function cancelNewEmployee() {
  document.getElementById("newEmployeeFormContainer").classList.add("hidden");
  document.getElementById("employeeListContainer").classList.remove("hidden");
}

async function saveNewEmployee() {
  const empId = document.getElementById("newEmpId").value.trim();
  const name = document.getElementById("newEmpName").value.trim();
  const rate = document.getElementById("newEmpRate").value.trim();
  const pin = document.getElementById("newEmpPin").value.trim();
  if (!empId || !name || !rate || !pin) { alert("All fields are required."); return; }
  if (isNaN(rate) || parseFloat(rate) <= 0) { alert("Hourly rate must be a positive number."); return; }
  if (!/^\\d{4}$/.test(pin)) { alert("PIN must be 4 digits."); return; }
  const { error } = await _supabase.from("employees").insert([{ employee_id: empId, name: name, hourly_rate: parseFloat(rate), pin: pin }]);
  if (error) { alert("Error creating employee: " + error.message); } 
  else { alert("Employee created successfully!"); cancelNewEmployee(); renderEmployeeList(); }
}

async function openEditEmployeeForm(employeeId) {
  editingEmployeeId = employeeId;
  const { data, error } = await _supabase.from("employees").select("*").eq("id", employeeId).single();
  if (error) { alert("Error fetching employee data."); return; }
  document.getElementById("editEmpId").value = data.employee_id;
  document.getElementById("editEmpName").value = data.name;
  document.getElementById("editEmpRate").value = data.hourly_rate;
  document.getElementById("editEmpActive").checked = data.active;
  document.getElementById("editEmpPin").value = "";
  document.getElementById("employeeListContainer").classList.add("hidden");
  document.getElementById("newEmployeeFormContainer").classList.add("hidden");
  document.getElementById("editEmployeeFormContainer").classList.remove("hidden");
}

function cancelEditEmployee() {
  editingEmployeeId = null;
  document.getElementById("editEmployeeFormContainer").classList.add("hidden");
  document.getElementById("employeeListContainer").classList.remove("hidden");
}

async function saveEditedEmployee() {
  if (!editingEmployeeId) return;
  const name = document.getElementById("editEmpName").value.trim();
  const rate = document.getElementById("editEmpRate").value.trim();
  const pin = document.getElementById("editEmpPin").value.trim();
  const active = document.getElementById("editEmpActive").checked;
  if (!name || !rate) { alert("Name and Hourly Rate are required."); return; }
  let updateData = { name: name, hourly_rate: parseFloat(rate), active: active };
  if (pin) {
    if (!/^\\d{4}$/.test(pin)) { alert("If changing PIN, it must be 4 digits."); return; }
    updateData.pin = pin;
  }
  const { error } = await _supabase.from("employees").update(updateData).eq("id", editingEmployeeId);
  if (error) { alert("Error updating employee: " + error.message); }
  else { alert("Employee updated successfully!"); cancelEditEmployee(); renderEmployeeList(); }
}

async function viewTimeEntries() {
  const container = document.getElementById("adminActions");
  container.innerHTML = "<h3>Loading time entries...</h3>";
  const { data, error } = await _supabase.from("time_entries").select("*").order("clock_in", { ascending: false }).limit(50);
  if (error) { container.innerHTML = "Error loading entries"; return; }
  let html = "<h3>Recent Time Entries</h3><table border='1' style='width:100%; font-size:12px; border-collapse: collapse;'><tr><th>Employee</th><th>Clock In</th><th>Clock Out</th><th>Regular</th><th>Overtime</th><th>Gross Pay</th><th>Action</th></tr>";
  data.forEach(entry => {
    let clockOutDisplay = entry.clock_out ? parseDbTimestamp(entry.clock_out)?.toLocaleString() || "INVALID" : "OPEN";
    let actionButton = \`<button onclick="openEditEntry('\${entry.id}')">Edit</button>\`;
    if (!entry.clock_out) { actionButton += \` <button onclick="adminCloseEntry('\${entry.id}')">Close</button>\`; }
    const regHours = entry.regular_hours ? Number(entry.regular_hours).toFixed(2) : '-';
    const otHours = entry.overtime_hours ? Number(entry.overtime_hours).toFixed(2) : '-';
    const grossPay = entry.gross_pay ? \`$\${Number(entry.gross_pay).toFixed(2)}\` : '-';
    html += \`<tr style="border-top: 1px solid #ccc;"><td style="padding: 4px;">\${entry.employee_id}</td><td style="padding: 4px;">\${parseDbTimestamp(entry.clock_in)?.toLocaleString() || "INVALID"}</td><td style="padding: 4px;">\${clockOutDisplay}</td><td style="padding: 4px;">\${regHours}</td><td style="padding: 4px;">\${otHours}</td><td style="padding: 4px;">\${grossPay}</td><td style="padding: 4px;">\${actionButton}</td></tr>\`;
  });
  html += "</table><br><button onclick='showAdminPanel()'>Back</button>";
  container.innerHTML = html;
}

}

function createAdmin() { alert("Create Admin panel coming next"); }

function logout() {
  sessionStorage.removeItem('adminAuthenticated');
  sessionStorage.removeItem('adminData');
  window.location.href = 'index.html';
}

// Initial load
showAdminPanel();

</script>
