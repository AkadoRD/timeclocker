
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Color de fondo corregido */
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 20px; background-color: #f8f9fa; }
    .hidden { display: none !important; }
    .panel { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); max-width: 800px; margin: 20px auto; }
    button { background-color: #2cb3ba; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 1rem; margin: 5px; }
    table { width:100%; font-size:14px; border-collapse: collapse; }
    th, td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
    h2, h3 { color: #2f3640; }
    select, input[type='text'], input[type='number'] { width: calc(100% - 16px); padding: 8px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #ddd; }
  </style>
</head>
<body>

<script>
  const _supabase = supabase.createClient("https://jqppakaodpgbtxzpvsti.supabase.co", "sb_publishable_ZwLCHMtM9uCfBFkwBcSSEQ_zQVq1RwI");
  if (!sessionStorage.getItem('adminAuthenticated')) {
    window.location.href = 'index.html';
  }
</script>

<div id="adminPanel" class="panel">
  <h2>Admin Dashboard</h2>
  <p id="adminInfo"></p>
  <div id="adminActions"></div>
  <button onclick="logout()">Logout</button>
</div>

<div id="manageClientsPanel" class="panel hidden">...</div>
<div id="manageProjectsPanel" class="panel hidden">...</div>
<div id="manageEmployeesPanel" class="panel hidden">...</div>

<!-- Nuevo panel para ver los registros de tiempo -->
<div id="viewTimeEntriesPanel" class="panel hidden">
  <h2>Time Entries</h2>
  <div id="timeEntriesListContainer"></div><br>
  <button onclick="showAdminDashboard()">Back to Dashboard</button>
</div>

<script>

document.addEventListener('DOMContentLoaded', initializeApp);

function initializeApp() {
    const adminData = JSON.parse(sessionStorage.getItem('adminData'));
    if (!adminData) { logout(); return; }
    document.getElementById("adminInfo").innerText = `Welcome ${adminData.name}`;
    const actions = document.getElementById("adminActions");
    // Botón "View Time Entries" añadido
    actions.innerHTML = `
        <button onclick="manageClients()">Manage Clients & Projects</button>
        <button onclick="manageEmployees()">Manage Employees</button>
        <button onclick="viewTimeEntries()">View Time Entries</button>
        <button onclick="alert('Reports not implemented')">Reports</button>
    `;
}

function showAdminDashboard() {
  document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
  document.getElementById('adminPanel').classList.remove('hidden');
  initializeApp(); // Refresca los datos del dashboard si es necesario
}

function logout() {
  sessionStorage.clear();
  window.location.href = 'index.html';
}

// --- Paneles de Administración ---
function manageClients() { 
    document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
    document.getElementById('manageClientsPanel').classList.remove('hidden');
}
function manageEmployees() { 
    document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
    document.getElementById('manageEmployeesPanel').classList.remove('hidden');
}

// --- Nueva Función para Ver Registros ---
async function viewTimeEntries() {
  document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
  document.getElementById('viewTimeEntriesPanel').classList.remove('hidden');
  
  const container = document.getElementById("timeEntriesListContainer");
  container.innerHTML = "<h3>Loading entries...</h3>";
  
  const { data, error } = await _supabase
    .from("time_entries")
    .select(`
      clock_in,
      clock_out,
      employee:employees(name),
      project:projects(name)
    `)
    .order("clock_in", { ascending: false })
    .limit(100);

  if (error) {
    container.innerHTML = "<p style='color:red;'>Error loading entries.</p>";
    console.error(error);
    return;
  }

  let html = "<table><tr><th>Employee</th><th>Project</th><th>Clock In</th><th>Clock Out</th><th>Duration</th></tr>";
  for (const entry of data) {
    const clockIn = new Date(entry.clock_in);
    const clockOut = entry.clock_out ? new Date(entry.clock_out) : null;
    let duration = 'Clocked In';
    if(clockOut) {
        const diffMs = clockOut - clockIn;
        const hours = Math.floor(diffMs / 3600000);
        const minutes = Math.floor((diffMs % 3600000) / 60000);
        duration = `${hours}h ${minutes}m`;
    }

    html += `
      <tr>
        <td>${entry.employee ? entry.employee.name : 'N/A'}</td>
        <td>${entry.project ? entry.project.name : 'N/A'}</td>
        <td>${clockIn.toLocaleString()}</td>
        <td>${clockOut ? clockOut.toLocaleString() : '---'}</td>
        <td>${duration}</td>
      </tr>
    `;
  }
  container.innerHTML = html + "</table>";
}

// El resto del código para manejar clientes, proyectos y empleados va aquí...
// ...

</script>
</body>
</html>
