
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon-192.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; background-color: #f8f9fa; color: #333; }
        .panel { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.07); max-width: 900px; margin: 20px auto; display: none; }
        .panel.active { display: block; }
        button { background-color: #2cb3ba; color: white; border: none; padding: 12px 18px; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: 500; margin: 5px; transition: background-color 0.2s; }
        button:hover { background-color: #259399; }
        button.secondary { background-color: #7f8c8d; }
        button.secondary:hover { background-color: #6c7a7d; }
        button.warning { background-color: #f39c12; }
        button.warning:hover { background-color: #e67e22; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ecf0f1; }
        th { background-color: #f8f9fa; font-weight: 600; }
        h2, h3 { color: #2f3640; border-bottom: 2px solid #2cb3ba; padding-bottom: 10px; margin-top: 0; }
        input, select { width: calc(100% - 20px); padding: 10px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #dcdde1; font-size: 1rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-container { margin-top:20px; padding:20px; border:1px solid #eee; border-radius:10px; background:#fdfdfd; }
        #employeeFormContainer { display: none; }

        /* --- Toast & Modal Styles --- */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 12000; }
        .toast { padding: 15px 20px; margin-bottom: 10px; border-radius: 8px; color: white; font-weight: 500; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: all 0.5s ease; opacity: 0; transform: translateX(100%); }
        .toast.show { opacity: 1; transform: translateX(0); }
        .toast.toast-success { background-color: #27ae60; }
        .toast.toast-error { background-color: #c0392b; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 11000; }
        .modal { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 90%; max-width: 450px; text-align: center; }
        .modal-actions { margin-top: 20px; }
    </style>
</head>

<div id="manageEmployeesPanel" class="panel"></div>
<div id="manageProjectsPanel" class="panel"></div>

<div id="confirm-modal-overlay" class="modal-overlay">
    <div class="modal">
        <div class="modal-content"><h3 id="modal-title"></h3><p id="modal-message"></p></div>
        <div class="modal-actions">
            <button id="modal-confirm-button" class="warning">Confirm</button>
            <button id="modal-cancel-button" class="secondary">Cancel</button>
        </div>
    </div>
</div>

<div id="edit-entry-modal-overlay" class="modal-overlay">
    <div class="modal">
        <h3>Edit Time Entry</h3>
        <input type="hidden" id="editEntryId">
        <div class="form-grid">
            <div>Clock In: <input type="datetime-local" id="editClockIn"></div>
            <div>Clock Out: <input type="datetime-local" id="editClockOut"></div>
        </div>
        <div class="modal-actions">
            <button onclick="saveTimeEntry()">Save Changes</button>
            <button onclick="document.getElementById('edit-entry-modal-overlay').style.display='none'" class="secondary">Cancel</button>
        </div>
    </div>
</div>

<script>
const _supabase = supabase.createClient("https://jqppakaodpgbtxzpvsti.supabase.co", "sb_publishable_ZwLCHMtM9uCfBFkwBcSSEQ_zQVq1RwI");
let historyStack = ['adminPanel'];
let allProjects = [];
let confirmCallback = null;
let numericClientId = null; // This will hold the correct numeric client ID

// --- UI & Utility Functions (No Changes) ---
function showToast(message, type = 'success') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.innerText = message;
    container.appendChild(toast);
    setTimeout(() => { toast.classList.add('show'); }, 10);
    setTimeout(() => {
        toast.classList.remove('show');
        toast.addEventListener('transitionend', () => toast.remove());
    }, 3000);
}
function showConfirmModal(title, message, onConfirm) { /* ... */ }
function hideConfirmModal() { /* ... */ }

document.getElementById('modal-confirm-button').addEventListener('click', () => { if (confirmCallback) confirmCallback(); hideConfirmModal(); });
document.getElementById('modal-cancel-button').addEventListener('click', hideConfirmModal);

// --- Auth & Initialization (THE FIX) ---
document.addEventListener('DOMContentLoaded', () => {
    const adminData = JSON.parse(sessionStorage.getItem('adminData'));

    // **THIS IS THE FIX:**
    // The login screen (`index.html`) puts `adminData` in sessionStorage.
    // This object *already* contains the numeric `client_id`.
    // My previous code was incorrectly trying to re-fetch this ID using an email, which doesn't exist in `adminData`.
    // That error triggered a logout, causing the redirect loop.
    // The correct logic is to simply check for `adminData` and its `client_id` directly.
    if (!adminData || !adminData.client_id) {
        window.location.href = 'index.html';
        return;
    }

    // Store the correct numeric ID for all other functions to use.
    numericClientId = adminData.client_id;
    
    const adminPanel = document.getElementById('adminPanel');
    adminPanel.innerHTML = `
        <h2>Admin Dashboard</h2>
        <p>Welcome, ${adminData.name}</p>
        <div id="adminActions">
            <button onclick="showPanel('manageEmployeesPanel')">Manage Employees</button>
            <button onclick="showPanel('manageProjectsPanel')">Manage Projects</button>
            <button onclick="showPanel('timeEntriesPanel')">View Time Entries</button>
            <button onclick="showPanel('reportsPanel')">Reports</button>
        </div>
        <button onclick="logout()" class="warning">Logout</button>
    `;
    showPanel('adminPanel');
});

// --- Navigation ---
function showPanel(panelId) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(panelId)?.classList.add('active');
    if (historyStack[historyStack.length - 1] !== panelId) historyStack.push(panelId);

    const panelActions = {
        adminPanel: fetchAllProjects,
        manageEmployeesPanel: renderEmployeeList,
        manageProjectsPanel: renderProjectsList,
        timeEntriesPanel: renderTimeEntries,
        reportsPanel: renderReportsPanel
    };
    panelActions[panelId]?.();
}

function goBack() {
    if (historyStack.length <= 1) return;
    historyStack.pop();
    showPanel(historyStack[historyStack.length - 1]);
}

function logout() {
    sessionStorage.clear();
    window.location.href = 'index.html';
}

// --- Data Fetching ---
async function fetchAllProjects() {
    if (!numericClientId) return;
    const { data, error } = await _supabase.from('projects').select('id, name').eq('client_id', numericClientId).order('name');
    allProjects = error ? [] : data;
}

// --- PROJECT MANAGEMENT ---
async function renderProjectsList(editProjectId = null, currentName = '') {
    const panel = document.getElementById('manageProjectsPanel');
    panel.innerHTML = '<h2>Manage Projects</h2><p>Loading...</p>';
    await fetchAllProjects();

    panel.innerHTML = `
        <h2>Manage Projects</h2>
        <button onclick="goBack()" class="secondary">Back</button>
        <div class="form-container">
            <h3>${editProjectId ? 'Edit Project' : 'Create New Project'}</h3>
            <input type="hidden" id="projectId" value="${editProjectId || ''}">
            <input type="text" id="projectName" placeholder="Project Name" value="${currentName}">
            <button onclick="saveProject()">${editProjectId ? 'Save Changes' : 'Create Project'}</button>
            ${editProjectId ? `<button onclick="renderProjectsList()" class="secondary">Cancel Edit</button>` : ''}
        </div>
        <h3>Existing Projects</h3>
        <table>
            <tr><th>Project Name</th><th>Actions</th></tr>
            ${allProjects.map(p => `
                <tr>
                    <td>${p.name}</td>
                    <td>
                        <button onclick="renderProjectsList('${p.id}', '${p.name}')" class="secondary">Edit</button>
                        <button onclick="deleteProject('${p.id}','${p.name}')" class="warning">Delete</button>
                    </td>
                </tr>`).join('')}
        </table>`;
}

async function saveProject() {
    const projectId = document.getElementById('projectId').value;
    const projectName = document.getElementById('projectName').value.trim();
    if (!projectName) { showToast('Project name cannot be empty.', 'error'); return; }
    
    let response;
    if (projectId) {
        response = await _supabase.from('projects').update({ name: projectName }).eq('id', projectId);
    } else {
        response = await _supabase.from('projects').insert([{ name: projectName, client_id: numericClientId }]).select();
    }

    if (response.error) showToast('Error: ' + response.error.message, 'error');
    else { showToast(projectId ? 'Project updated!' : 'Project created!', 'success'); renderProjectsList(); }
}

async function deleteProject(projectId, name) {
    showConfirmModal(`Delete ${name}`, `Are you sure?`, async () => {
        const { error } = await _supabase.from('projects').delete().eq('id', projectId);
        if (error) showToast('Error: ' + error.message, 'error');
        else { showToast('Project deleted.', 'success'); renderProjectsList(); }
    });
}

// --- EMPLOYEE MANAGEMENT ---
async function renderEmployeeList() {
    const panel = document.getElementById('manageEmployeesPanel');
    panel.innerHTML = '<h2>Manage Employees</h2><p>Loading...</p>';
    await fetchAllProjects();
    const { data: employees, error } = await _supabase.from('employees').select('*, project:projects(name)').eq('client_id', numericClientId).order('employee_id');
    if (error) { panel.innerHTML += `<p style="color:red">${error.message}</p>`; return; }

    let projectOptions = allProjects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    
    panel.innerHTML = `
        <h2>Manage Employees</h2>
        <button onclick="goBack()" class="secondary">Back</button>
        <button onclick="openEmployeeForm()" style="margin-left: 10px;">Add New Employee</button>
        <div id="employeeFormContainer" class="form-container"> /* ... form ... */ </div>
        <h3>Existing Employees</h3>
        <table>
            <tr><th>ID</th><th>Name</th><th>Project</th><th>Status</th><th>Actions</th></tr>
            ${employees.map(emp => `
                <tr>
                    <td>${emp.employee_id}</td>
                    <td>${emp.name}</td>
                    <td>${emp.project ? emp.project.name : 'None'}</td>
                    <td>${emp.active ? 'Active' : 'Inactive'}</td>
                    <td>
                        <button onclick="openEmployeeForm('${emp.id}')" class="secondary">Edit</button>
                        <button onclick="deleteEmployee('${emp.id}', '${emp.name}')" class="warning">Delete</button>
                    </td>
                </tr>`).join('')}
        </table>`;
    // Populate form separately to keep main structure clean
    document.querySelector('#employeeFormContainer').innerHTML = `
        <h3 id="employeeFormTitle">Add/Edit Employee</h3>
        <input type="hidden" id="empDbId">
        <div class="form-grid">
            <div>Employee ID: <input type="text" id="empId"></div>
            <div>Name: <input type="text" id="empName"></div>
            <div>Hourly Rate: <input type="number" id="empRate"></div>
            <div>PIN (4-digits): <input type="password" id="empPin" placeholder="Required for new employee"></div>
            <div>Project: <select id="empProject"><option value="">None</option>${projectOptions}</select></div>
            <div><label><input type="checkbox" id="empActive" checked> Active</label></div>
        </div>
        <button id="saveEmpButton" onclick="saveEmployee()">Save</button>
        <button onclick="document.getElementById('employeeFormContainer').style.display='none'" class="secondary">Cancel</button>
    `;
}

async function openEmployeeForm(dbId = null) { /* ... same as before, no changes needed ... */ }
async function saveEmployee() { /* ... same as before, no changes needed ... */ }

// --- TIME ENTRY MANAGEMENT ---
async function renderTimeEntries() {
    const panel = document.getElementById('timeEntriesPanel');
    panel.innerHTML = '<h2>Recent Time Entries</h2><p>Loading...</p>';
    const { data, error } = await _supabase.from('time_entries').select('*, employee:employees(name)').eq('client_id', numericClientId).order('clock_in', { ascending: false }).limit(100);
    if(error) { panel.innerHTML += `<p style="color:red">${error.message}</p>`; return; }
    
    panel.innerHTML = `
        <h2>Recent Time Entries</h2>
        <button onclick="goBack()" class="secondary">Back</button>
        <table>
            <tr><th>Employee</th><th>Clock In</th><th>Clock Out</th><th>Actions</th></tr>
            ${data.map(entry => `
                <tr>
                    <td>${entry.employee ? entry.employee.name : 'N/A'}</td>
                    <td>${new Date(entry.clock_in).toLocaleString()}</td>
                    <td>${entry.clock_out ? new Date(entry.clock_out).toLocaleString() : '<b>Still Clocked In</b>'}</td>
                    <td>
                        ${!entry.clock_out ? `<button onclick="closeEntry('${entry.id}')" class="warning">Force Clock-Out</button>` : ''}
                        <button onclick="openEditEntryModal('${entry.id}', '${entry.clock_in}', '${entry.clock_out}')" class="secondary">Edit</button>
                    </td>
                </tr>`).join('')}
        </table>`;
}

function openEditEntryModal(entryId, clockIn, clockOut) { /* ... same as before ... */ }

function renderReportsPanel() { /* ... same as before ... */ }

</script>

</html>
