
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon-192.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; background-color: #f8f9fa; color: #333; }
        .panel { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.07); max-width: 900px; margin: 20px auto; display: none; }
        .panel.active { display: block; }
        button { background-color: #2cb3ba; color: white; border: none; padding: 12px 18px; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: 500; margin: 5px; transition: background-color 0.2s; }
        button:hover { background-color: #259399; }
        button.secondary { background-color: #7f8c8d; }
        button.secondary:hover { background-color: #6c7a7d; }
        button.warning { background-color: #f39c12; }
        button.warning:hover { background-color: #e67e22; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ecf0f1; }
        th { background-color: #f8f9fa; font-weight: 600; }
        h2, h3 { color: #2f3640; border-bottom: 2px solid #2cb3ba; padding-bottom: 10px; margin-top: 0; }
        input, select { width: calc(100% - 20px); padding: 10px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #dcdde1; font-size: 1rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-container { margin-top:20px; padding:20px; border:1px solid #eee; border-radius:10px; background:#fdfdfd; }
        #employeeFormContainer { display: none; }

        /* --- Toast & Modal Styles --- */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 12000; display: flex; flex-direction: column; align-items: flex-end; }
        .toast { padding: 15px 20px; margin-bottom: 10px; border-radius: 8px; color: white; font-weight: 500; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: all 0.5s ease; opacity: 0; transform: translateX(100%); }
        .toast.show { opacity: 1; transform: translateX(0); }
        .toast.toast-success { background-color: #27ae60; }
        .toast.toast-error { background-color: #c0392b; }
        .toast.toast-info { background-color: #3498db; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 11000; }
        .modal { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 90%; max-width: 400px; text-align: center; }
        .modal-actions { margin-top: 20px; }
    </style>
</head>
<body>

<div id="adminPanel" class="panel active"></div>
<div id="manageEmployeesPanel" class="panel"></div>
<div id="manageProjectsPanel" class="panel"></div>
<div id="timeEntriesPanel" class="panel"></div>
<div id="reportsPanel" class="panel"></div>

<div id="toast-container"></div>
<div id="confirm-modal-overlay" class="modal-overlay">
    <div class="modal">
        <div class="modal-content"><h3 id="modal-title"></h3><p id="modal-message"></p></div>
        <div class="modal-actions">
            <button id="modal-confirm-button" class="warning">Confirm</button>
            <button id="modal-cancel-button" class="secondary">Cancel</button>
        </div>
    </div>
</div>

<script>
const _supabase = supabase.createClient("https://jqppakaodpgbtxzpvsti.supabase.co", "sb_publishable_ZwLCHMtM9uCfBFkwBcSSEQ_zQVq1RwI");
let historyStack = ['adminPanel'];
let allProjects = [];
let confirmCallback = null;

// --- UI & Utility Functions ---
function showToast(message, type = 'success') { /* ... no changes ... */ }
function showConfirmModal(title, message, onConfirm) { /* ... no changes ... */ }
function hideConfirmModal() { /* ... no changes ... */ }

// --- Auth & Navigation ---
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('modal-confirm-button').addEventListener('click', () => { if (confirmCallback) confirmCallback(); hideConfirmModal(); });
    document.getElementById('modal-cancel-button').addEventListener('click', hideConfirmModal);

    const adminData = JSON.parse(sessionStorage.getItem('adminData'));
    if (!adminData) { window.location.href = 'index.html'; return; }
    
    const adminPanel = document.getElementById('adminPanel');
    adminPanel.innerHTML = `
        <h2>Admin Dashboard</h2>
        <p>Welcome, ${adminData.name}</p>
        <div id="adminActions">
            <button onclick="showPanel('manageEmployeesPanel')">Manage Employees</button>
            <button onclick="showPanel('manageProjectsPanel')">Manage Projects</button>
            <button onclick="showPanel('timeEntriesPanel')">View Time Entries</button>
            <button onclick="showPanel('reportsPanel')">Reports</button>
        </div>
        <button onclick="logout()" class="warning">Logout</button>
    `;
    showPanel('adminPanel');
});

function showPanel(panelId) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    const panel = document.getElementById(panelId);
    if(panel) panel.classList.add('active');
    
    if (historyStack[historyStack.length - 1] !== panelId) historyStack.push(panelId);

    if (panelId === 'adminPanel') fetchAllProjects();
    if (panelId === 'manageEmployeesPanel') renderEmployeeList();
    if (panelId === 'manageProjectsPanel') renderProjectsList();
    if (panelId === 'timeEntriesPanel') renderTimeEntries();
    if (panelId === 'reportsPanel') renderReportsPanel();
}

function goBack() {
    if (historyStack.length <= 1) return;
    historyStack.pop();
    const lastPanel = historyStack[historyStack.length - 1];
    showPanel(lastPanel);
}

async function fetchAllProjects() {
    const { data, error } = await _supabase.from('projects').select('id, name').order('name');
    if (error) {
        console.error("Error fetching projects:", error);
        allProjects = [];
    } else {
        allProjects = data;
    }
}

function logout() {
    sessionStorage.clear();
    window.location.href = 'index.html';
}

// --- PROJECT MANAGEMENT ---
async function renderProjectsList(editProjectId = null, currentName = '') { /* ... same as before ... */ }
async function saveProject() { /* ... same as before ... */ }
async function deleteProject(projectId) { /* ... same as before ... */ }

// --- EMPLOYEE MANAGEMENT (CRUD) ---
async function renderEmployeeList() {
    const panel = document.getElementById('manageEmployeesPanel');
    panel.innerHTML = '<h2>Manage Employees</h2><p>Loading...</p>';
    await fetchAllProjects();
    const adminData = JSON.parse(sessionStorage.getItem('adminData'));
    const { data: employees, error } = await _supabase.from('employees').select('*, project:projects(name)').eq('client_id', adminData.id).order('employee_id');
    if (error) { /* handle error */ return; }

    let projectOptions = allProjects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    
    let content = `
        <h2>Manage Employees</h2>
        <button onclick="goBack()" class="secondary">Back</button>
        <button onclick="openEmployeeForm()" style="margin-left: 10px;">Add New Employee</button>
        <div id="employeeFormContainer" class="form-container">
            <h3 id="employeeFormTitle">Add/Edit Employee</h3>
            <input type="hidden" id="empDbId">
            <div class="form-grid">
                <div>Employee ID: <input type="text" id="empId"></div>
                <div>Name: <input type="text" id="empName"></div>
                <div>Hourly Rate: <input type="number" id="empRate"></div>
                <div>PIN (4-digits): <input type="password" id="empPin" placeholder="Required for new employee"></div>
                <div>Project: <select id="empProject"><option value="">None</option>${projectOptions}</select></div>
                <div><label><input type="checkbox" id="empActive" checked> Active</label></div>
            </div>
            <button id="saveEmpButton" onclick="saveEmployee()">Save</button>
            <button onclick="document.getElementById('employeeFormContainer').style.display='none'" class="secondary">Cancel</button>
        </div>
        <h3>Existing Employees</h3>
        <table>
            <tr><th>ID</th><th>Name</th><th>Current Project</th><th>Status</th><th>Actions</th></tr>
            ${employees.map(emp => `
                <tr>
                    <td>${emp.employee_id}</td>
                    <td>${emp.name}</td>
                    <td>${emp.project ? emp.project.name : 'None'}</td>
                    <td>${emp.active ? 'Active' : 'Inactive'}</td>
                    <td>
                        <button onclick="openEmployeeForm('${emp.id}')" class="secondary">Edit</button>
                        <button onclick="deleteEmployee('${emp.id}', '${emp.name}')" class="warning">Delete</button>
                    </td>
                </tr>`).join('')}
        </table>`;
    panel.innerHTML = content;
}

async function openEmployeeForm(dbId = null) {
    const form = document.getElementById('employeeFormContainer');
    const formTitle = document.getElementById('employeeFormTitle');
    const saveButton = document.getElementById('saveEmpButton');
    const empIdInput = document.getElementById('empId');

    document.getElementById('empDbId').value = '';
    empIdInput.value = '';
    document.getElementById('empName').value = '';
    document.getElementById('empRate').value = '';
    document.getElementById('empPin').value = '';
    document.getElementById('empProject').value = '';
    document.getElementById('empActive').checked = true;
    empIdInput.readOnly = false;

    if (dbId) { // Editing existing employee
        formTitle.innerText = 'Edit Employee';
        saveButton.innerText = 'Save Changes';
        const { data, error } = await _supabase.from('employees').select('*').eq('id', dbId).single();
        if (error) { showToast('Error fetching employee data.', 'error'); return; }
        
        document.getElementById('empDbId').value = data.id;
        empIdInput.value = data.employee_id;
        empIdInput.readOnly = true; // Cannot change employee ID
        document.getElementById('empName').value = data.name;
        document.getElementById('empRate').value = data.hourly_rate;
        document.getElementById('empProject').value = data.current_project_id || '';
        document.getElementById('empActive').checked = data.active;
        document.getElementById('empPin').placeholder = 'Leave blank to keep same';
    } else { // Creating new employee
        formTitle.innerText = 'Create New Employee';
        saveButton.innerText = 'Create Employee';
        document.getElementById('empPin').placeholder = 'Required (4 digits)';
    }
    form.style.display = 'block';
}

async function saveEmployee() {
    const dbId = document.getElementById('empDbId').value;
    const employeeId = document.getElementById('empId').value.trim();
    const name = document.getElementById('empName').value.trim();
    const rate = parseFloat(document.getElementById('empRate').value);
    const pin = document.getElementById('empPin').value;
    const projectId = document.getElementById('empProject').value;
    const active = document.getElementById('empActive').checked;

    if (!employeeId || !name) { showToast('Employee ID and Name are required.', 'error'); return; }

    let data = {
        employee_id: employeeId,
        name: name,
        hourly_rate: rate,
        current_project_id: projectId ? parseInt(projectId) : null,
        active: active,
    };

    let response;
    if (dbId) { // Update
        if (pin) {
            if (pin.length !== 4 || !/^\d+$/.test(pin)) { showToast('PIN must be 4 digits.', 'error'); return; }
            data.pin = pin;
        }
        response = await _supabase.from('employees').update(data).eq('id', dbId);
    } else { // Insert
        if (!pin || pin.length !== 4 || !/^\d+$/.test(pin)) { showToast('A 4-digit PIN is required for new employees.', 'error'); return; }
        data.pin = pin;
        const adminData = JSON.parse(sessionStorage.getItem('adminData'));
        data.client_id = adminData.id;
        response = await _supabase.from('employees').insert([data]).select();
    }

    if (response.error) {
        showToast('Error: ' + response.error.message, 'error');
    } else {
        showToast(dbId ? 'Employee updated!' : 'Employee created!', 'success');
        document.getElementById('employeeFormContainer').style.display = 'none';
        renderEmployeeList();
    }
}

async function deleteEmployee(dbId, name) {
    showConfirmModal(`Delete ${name}`, `Are you sure you want to delete this employee? This action is permanent.`, async () => {
        const { error } = await _supabase.from('employees').delete().eq('id', dbId);
        if (error) {
            showToast('Error: ' + error.message, 'error');
        } else {
            showToast('Employee deleted.', 'success');
            renderEmployeeList();
        }
    });
}

// --- TIME ENTRY & REPORTS (No changes, full code included) ---
async function renderTimeEntries() {
    const panel = document.getElementById('timeEntriesPanel');
    panel.innerHTML = '<h2>Time Entries</h2><p>Loading...</p>';
    const { data, error } = await _supabase.from('time_entries').select('*, employee:employees(name)').order('clock_in', { ascending: false }).limit(100);
    if(error) { panel.innerHTML = '<p style="color:red;">Error loading entries.</p>'; return; }
    
    let content = `
        <h2>Recent Time Entries</h2>
        <button onclick="goBack()" class="secondary">Back</button>
        <table>
            <tr><th>Employee</th><th>Clock In</th><th>Clock Out</th><th>Actions</th></tr>
            ${data.map(entry => `
                <tr>
                    <td>${entry.employee ? entry.employee.name : 'N/A'}</td>
                    <td>${new Date(entry.clock_in).toLocaleString()}</td>
                    <td>${entry.clock_out ? new Date(entry.clock_out).toLocaleString() : '<b>Still Clocked In</b>'}</td>
                    <td>
                        ${!entry.clock_out ? `<button onclick="closeEntry('${entry.id}')" class="warning">Close Entry</button>` : ''}
                        <button onclick="showToast('Editing time entries is not yet available.', 'info')" class="secondary">Edit</button>
                    </td>
                </tr>`).join('')}
        </table>`;
    panel.innerHTML = content;
}

async function closeEntry(entryId) {
    showConfirmModal('Close Entry', 'Are you sure you want to manually close this entry?', async () => {
        const { error } = await _supabase.from('time_entries').update({ clock_out: new Date().toISOString() }).eq('id', entryId);
        if (error) {
            showToast('Error: ' + error.message, 'error');
        } else {
            showToast('Entry closed successfully.', 'success');
            renderTimeEntries();
        }
    });
}

function renderReportsPanel() {
    const panel = document.getElementById('reportsPanel');
    panel.innerHTML = `
        <h2>Reports</h2>
        <button onclick="goBack()" class="secondary">Back</button>
        <div class="form-grid" style="margin-top:20px;">
            <div>Start Date: <input type="date" id="startDate"></div>
            <div>End Date: <input type="date" id="endDate"></div>
        </div>
        <button onclick="generateReport()">Generate Report</button>
        <div id="reportResult" style="margin-top:20px;"></div>
    `;
}

async function generateReport() {
    const startDate = document.getElementById('startDate').value;
    const endDate = document.getElementById('endDate').value;
    if (!startDate || !endDate) { showToast('Please select a start and end date.', 'error'); return; }

    const resultDiv = document.getElementById('reportResult');
    resultDiv.innerHTML = '<p>Generating...</p>';

    const { data, error } = await _supabase.from('time_entries')
        .select('*, employee:employees(name, hourly_rate), project:projects(name)')
        .gte('clock_in', startDate)
        .lte('clock_in', new Date(endDate).toISOString().replace('T00:00:00.000Z', 'T23:59:59.999Z'))
        .order('clock_in');

    if (error) { resultDiv.innerHTML = `<p style="color:red">Error: ${error.message}</p>`; return; }
    if (data.length === 0) { resultDiv.innerHTML = '<p>No entries found for this period.</p>'; return; }

    let table = '<table><tr><th>Employee</th><th>Project</th><th>Clock In</th><th>Clock Out</th><th>Duration (H)</th><th>Pay</th></tr>';
    let totalPay = 0;
    let csvData = [['Employee', 'Project', 'Clock In', 'Clock Out', 'Duration Hours', 'Pay']];

    data.forEach(entry => {
        if (!entry.clock_out || !entry.employee) return;
        const clockIn = new Date(entry.clock_in);
        const clockOut = new Date(entry.clock_out);
        const durationMs = clockOut - clockIn;
        const durationHours = durationMs / 3600000;
        const pay = durationHours * (entry.employee.hourly_rate || 0);
        totalPay += pay;

        table += `<tr>
            <td>${entry.employee.name}</td>
            <td>${entry.project ? entry.project.name : 'N/A'}</td>
            <td>${clockIn.toLocaleString()}</td>
            <td>${clockOut.toLocaleString()}</td>
            <td>${durationHours.toFixed(2)}</td>
            <td>$${pay.toFixed(2)}</td>
        </tr>`;
        csvData.push([entry.employee.name, entry.project ? entry.project.name : 'N/A', clockIn.toISOString(), clockOut.toISOString(), durationHours.toFixed(2), pay.toFixed(2)]);
    });

    table += `<tr<td colspan="5" style="text-align:right;font-weight:bold;">Total Payroll:</td><td style="font-weight:bold;">$${totalPay.toFixed(2)}</td></tr></table>`;
    resultDiv.innerHTML = `<button onclick="exportToCSV(JSON.parse(decodeURIComponent('${encodeURIComponent(JSON.stringify(csvData))}')))">Export to CSV</button>${table}`;
}

function exportToCSV(data) {
    let csvContent = "data:text/csv;charset=utf-8," + data.map(e => e.join(",")).join("\n");
    var encodedUri = encodeURI(csvContent);
    var link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", "report.csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

</script>
