
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .container { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #2f3640; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #2cb3ba; color: white; border: none; padding: 12px 18px; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: 500; width: 100%; transition: background-color 0.2s; }
        button:hover { background-color: #259399; }
        .message { margin-top: 15px; }
        .error { color: red; }
        .success { color: green; }
        a { color: #2cb3ba; text-decoration: none; margin-top: 15px; display: inline-block; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div id="update-password-container" class="container">
        <h2>Set a New Password</h2>
        <form id="update-password-form">
            <input type="password" id="new-password" placeholder="Enter new password" required>
            <button type="submit">Update Password</button>
        </form>
        <p id="update-message" class="message" style="display: none;"></p>
        <a href="admin_login.html" id="back-to-login" style="display: none;">Back to Login</a>
    </div>

    <script>
        const SUPABASE_URL = 'https://jqppakaodpgbtxzpvsti.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcHBha2FvZHBnYnR4enB2c3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDIxOTEsImV4cCI6MjA4NjY3ODE5MX0.ksc0lzbjlMxC942dkSBSwJHpnwTjcyFV4ZX91LFtijk';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const updateMessage = document.getElementById('update-message');
        const backToLoginLink = document.getElementById('back-to-login');
        const form = document.getElementById('update-password-form');

        _supabase.auth.onAuthStateChange(async (event, session) => {
            if (event === 'PASSWORD_RECOVERY') {
                document.getElementById('update-password-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const newPassword = document.getElementById('new-password').value;
                    const userId = session.user.id; // It's safe to get the user ID from the session

                    try {
                         const { error } = await _supabase.functions.invoke('update-user', {
                            body: { userId, password: newPassword },
                        });
                        if (error) throw error;
                        
                        updateMessage.textContent = 'Password updated successfully!';
                        updateMessage.className = 'message success';
                        form.style.display = 'none';
                        
                    } catch (error) {
                        updateMessage.textContent = 'Error: ' + error.message;
                        updateMessage.className = 'message error';
                    } finally {
                        updateMessage.style.display = 'block';
                        backToLoginLink.style.display = 'inline-block';
                    }
                });
            } else {
                 updateMessage.textContent = 'Invalid or expired password recovery token. Please request a new password reset.';
                 updateMessage.className = 'message error';
                 updateMessage.style.display = 'block';
                 backToLoginLink.style.display = 'inline-block';
                 form.style.display = 'none';
            }
        });
    </script>
</body>
</html>
